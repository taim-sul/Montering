  function setSyncState(state) {
    syncState = state;

    if (!el) return;
    const labels = { synced: currentLang==='da'?'Synkroniseret':'Synced', syncing: currentLang==='da'?'Synkroniserer...':'Syncing...', offline: currentLang==='da'?'Offline':'Offline' };

    el.innerHTML = `<div class="sync-dot ${state==='syncing'?'pulse':''}"></div>${labels[state]}`;

  window.addEventListener('offline', () => setSyncState('offline'));

  // ── INSTALL PROMPT ───────────────────────────────────────────
  let deferredInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    if (!localStorage.getItem('sl_install_dismissed')) showInstallBanner();
  });
  function showInstallBanner() {
    if (document.getElementById('installBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'installBanner';
    banner.className = 'install-banner';
    banner.innerHTML = `

  async function triggerInstall() {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    const result = await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    document.getElementById('installBanner')?.remove();
  }
  function dismissInstall() {
    localStorage.setItem('sl_install_dismissed', '1');
    document.getElementById('installBanner')?.remove();
  }

  window.dismissInstall = dismissInstall;

  function initFirebase() {
    try {
      app = initializeApp(FIREBASE_CONFIG);
      auth = getAuth(app);
      db = getFirestore(app);
      storage = getStorage(app);
      setupAuthListener();
    } catch(e) {
      showToast('Firebase ikke konfigureret. Se firebase-config.js', 'error');
      console.error(e);
    }
  }

  function setupAuthListener() {
    onAuthStateChanged(auth, user => {
      if (user) {
        isLoggedIn = true;
        showApp();
        startListeners();
      } else {
        isLoggedIn = false;
        showLogin();
      }
    });
  }

  async function login() {
    const pw = document.getElementById('loginPw').value;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '...';
    try {
      await signInWithEmailAndPassword(auth, ADMIN_EMAIL, pw);
    } catch(e) {
      showToast('Forkert adgangskode', 'error');
      btn.disabled = false;
      btn.textContent = t().login;
    }
  }

  async function logout() {
    if (unsubscribeOrders) unsubscribeOrders();
    if (unsubscribeReports) unsubscribeReports();
    if (unsubscribeLocations) unsubscribeLocations();
    await signOut(auth);
  }

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    renderNav();
    navigateTo('orders');
  }

  function startListeners() {
    setSyncState('syncing');
    setTimeout(() => setSyncState('synced'), 1500);
    // Orders listener
    const ordersQ = query(collection(db, 'orders'), orderBy('serviceDate', 'asc'));
    unsubscribeOrders = onSnapshot(ordersQ, snap => {
      ordersData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === 'orders') renderOrders();
      updateStats();
    });

    // Reports listener
    const reportsQ = query(collection(db, 'reports'), orderBy('completedAt', 'desc'));
    unsubscribeReports = onSnapshot(reportsQ, snap => {
      reportsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentView === 'reports') renderReports();
    });

    // Team locations listener
    unsubscribeLocations = onSnapshot(collection(db, 'locations'), snap => {
      snap.docs.forEach(d => { teamLocations[d.id] = d.data(); });
      if (currentView === 'map') renderMap();
    });
  }

  function updateStats() {
    const total = ordersData.length;
    const completed = ordersData.filter(o => o.status === 'completed').length;
    const pending = ordersData.filter(o => o.status === 'pending' || o.status === 'uploaded').length;
    const active = new Set(ordersData.filter(o => o.status === 'inProgress').map(o => o.teamId)).size;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statCompleted').textContent = completed;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statActive').textContent = active;
  }

  // ── PDF UPLOAD & PARSE ────────────────────────────────────────
  async function loadPdfJs() {
    if (window.pdfjsLib) return;
    await new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      script.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        resolve();
      };
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }

  async function extractTextFromPDF(file) {
    await loadPdfJs();
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const text = content.items.map(item => item.str).join(' ');
      pages.push(text);
    }
    return pages;
  }

  function parseOrdersFromPages(pages) {
    const orders = [];
    let i = 0;
    while (i < pages.length) {
      const text = pages[i];
      if (text.includes('1/3') || (text.includes('Service Report') && text.includes('Print'))) {
        const order = parseOneOrder(pages, i);
        if (order && order.orderNumber) orders.push(order);
        i += 3;
      } else { i++; }
    }
    return orders;
  }

  function parseOneOrder(pages, startIdx) {
    const p1 = pages[startIdx] || '';
    const p3 = pages[startIdx + 2] || '';
    const fixSpaces = s => s.replace(/([a-zæøå])([A-ZÆØÅ])/g, '$1 $2').replace(/(\d{4})([A-ZÆØÅ])/g, '$1 $2').replace(/\s+/g, ' ').trim();
    const get = pattern => { const m = p1.match(pattern); return m ? m[1].trim() : ''; };

    const customerName = fixSpaces(get(/Customer\s*name\s+([^\n]+?)(?=Customer|Postal|Primary|$)/i));
    const address1 = fixSpaces(get(/Customer\s*address\s*1\s+(.+?)(?=Customer|Postal|$)/i));
    const postal = fixSpaces(get(/Postal\s*code[/\w]*\s+(.+?)(?=Primary|Secondary|Mobile|$)/i));
    const mobile = get(/Mobile\s*phone\s+(\+?[\d]+)/i);
    const email = get(/Email\s+(\S+@\S+)/i);
    const orderNumber = get(/Order\s*number\s+(\d{10})/i);
    const deliveryOrder = get(/Delivery\s*order\s*number\s+(\S+)/i);
    const store = fixSpaces(get(/Originating\s*store\s+(.+?)(?=Order|Delivery|$)/i));
    const provider = fixSpaces(get(/Service\s*provider\s+(.+?)(?=Service\s*product|$)/i)) || 'Bring E-Commerce & Logistics A/S';
    const product = get(/Service\s*product\s+(\w+)/i) || 'Assembly';

    const dateMatches = [...p1.matchAll(/(\d{2}-\d{2}-\d{4})\s+(\d{2}:\d{2})\s+(\d{2}-\d{2}-\d{4})\s+(\d{2}:\d{2})/g)];
    const serviceDates = dateMatches.map(m => `${m[1]} ${m[2]} — ${m[3]} ${m[4]}`);
    const serviceDate = dateMatches.length > 0
      ? dateMatches[0][1].split('-').reverse().join('-')
      : getTomorrow();

    const articles = parseArticles(p3);

    return { orderNumber, deliveryOrderNumber: deliveryOrder, customerName,
      customerAddress1: address1, postalCityState: postal, mobile, email,
      serviceProvider: provider, serviceProduct: product, originatingStore: store,
      serviceDates, serviceDate, articles,
      printDate: new Date().toLocaleDateString('da-DK') };
  }

  function parseArticles(text) {
    const articles = [];
    const lines = text.split(/\s{2,}|\n/);
    for (const line of lines) {
      const m = line.match(/(.+?)\s+(\d+[,.]?\d*)\s+(\d+[,.]?\d*)\s+(\d+[,.]?\d*)\s+(\d{8})\s+(\d+)/);
      if (m) {
        articles.push({ description: m[1].trim().replace(/([a-zæøå])([A-ZÆØÅ])/g, '$1 $2'),
          netPrice: m[2], vat: m[3], grossPrice: m[4], itemNo: m[5], qty: m[6], errorCode: '' });
      }
    }
    return articles;
  }

  async function handlePDFUpload(files) {
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.innerHTML = `<div class="upload-processing"><div class="spin"></div><p>${t().processing}</p></div>`;

    for (const file of files) {
      if (file.type !== 'application/pdf') continue;
      try {
        showToast(`Analyserer ${file.name}...`, 'info');
        const pages = await extractTextFromPDF(file);
        const orders = parseOrdersFromPages(pages);

        if (orders.length === 0) {
          showToast(`Ingen ordrer fundet i ${file.name}`, 'error');
          continue;
        }

        const storageRef = ref(storage, `pdfs/${Date.now()}_${file.name}`);
        const snap = await uploadBytes(storageRef, file);
        const pdfUrl = await getDownloadURL(snap.ref);

        for (const order of orders) {
          await addDoc(collection(db, 'orders'), {
            ...order, fileName: file.name, pdfUrl,
            status: 'uploaded', uploadedAt: new Date().toISOString(), teamId: null,
          });
        }
        showToast(`${file.name}: ${orders.length} kunde(r) oprettet`, 'success');
      } catch(e) {
        showToast(`Fejl ved upload: ${file.name}`, 'error');
        console.error(e);
      }
    }
    resetUploadArea();
  }

  function getTomorrow() {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return d.toISOString().split('T')[0];
  }

  function resetUploadArea() {
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.innerHTML = `
      <div class="upload-icon">📄</div>
      <p class="upload-title">${t().dragDrop}</p>
      <p class="upload-sub">${t().orClick}</p>
      <input type="file" id="fileInput" accept=".pdf" multiple style="display:none">
    `;
    setupUploadEvents();
  }

  function setupUploadEvents() {
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');

    uploadArea.onclick = () => fileInput.click();
    fileInput.onchange = e => handlePDFUpload(Array.from(e.target.files));

    uploadArea.ondragover = e => { e.preventDefault(); uploadArea.classList.add('dragover'); };
    uploadArea.ondragleave = () => uploadArea.classList.remove('dragover');
    uploadArea.ondrop = e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handlePDFUpload(Array.from(e.dataTransfer.files));
    };
  }

    try {
      await updateDoc(doc(db, 'orders', orderId), {
        teamId,
        serviceDate,
        status: 'pending',
        assignedAt: new Date().toISOString()
      });
      showToast('Team tildelt!', 'success');
    } catch(e) {
      showToast('Fejl ved tildeling', 'error');
    }
  }

    if (!confirm('Slet denne ordre?')) return;
    try {
      await deleteDoc(doc(db, 'orders', orderId));
      showToast('Ordre slettet', 'success');
    } catch(e) {
      showToast('Fejl ved sletning', 'error');

    currentView = view;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const navItem = document.querySelector(`[data-view="${view}"]`);
    if (navItem) navItem.classList.add('active');

    const main = document.getElementById('mainContent');
    main.innerHTML = '';

    switch(view) {
      case 'orders': renderOrders(); break;
      case 'upload': renderUpload(); break;
      case 'reports': renderReports(); break;
      case 'map': renderMap(); break;
      case 'checkins': renderCheckins(); break;
    }
  }

  function renderOrders() {
    const main = document.getElementById('mainContent');
    const tomorrow = getTomorrow();
    const todayOrders = ordersData.filter(o => o.serviceDate === tomorrow || o.serviceDate === new Date().toISOString().split('T')[0]);
    const otherOrders = ordersData.filter(o => o.serviceDate !== tomorrow && o.serviceDate !== new Date().toISOString().split('T')[0]);

    main.innerHTML = `
      <div class="page-header">
        <h1>${t().orders}</h1>
        <div class="stats-row">
          <div class="stat-chip"><span id="statTotal">0</span><label>${t().totalOrders}</label></div>
          <div class="stat-chip completed"><span id="statCompleted">0</span><label>${t().completedToday}</label></div>
          <div class="stat-chip pending"><span id="statPending">0</span><label>${t().pendingOrders}</label></div>
          <div class="stat-chip active"><span id="statActive">0</span><label>${t().activeTeams}</label></div>
        </div>
      </div>
      <div class="orders-section">
        <h2 class="section-title">📅 ${t().tomorrow} (${tomorrow})</h2>
        <div class="orders-grid" id="tomorrowOrders">
          ${todayOrders.length ? todayOrders.map(o => renderOrderCard(o)).join('') : `<p class="empty">${t().noOrders}</p>`}
        </div>
        <h2 class="section-title" style="margin-top:2rem">📦 ${t().orders}</h2>
        <div class="orders-grid" id="otherOrders">
          ${otherOrders.length ? otherOrders.map(o => renderOrderCard(o)).join('') : `<p class="empty">${t().noOrders}</p>`}
        </div>
      </div>
    `;
    updateStats();
  }

  function renderOrderCard(order) {
    const team = TEAMS.find(t => t.id === order.teamId);
    const statusColors = {
      uploaded: '#666', pending: '#E8A83E', inProgress: '#3E8BE8',
      completed: '#3EBE6B', failed: '#E83E3E'
    };
    const statusLabels = {
      uploaded: t().uploaded, pending: t().pending,
      inProgress: t().inProgress, completed: t().completed, failed: t().failed
    };

    return `
      <div class="order-card" data-id="${order.id}">
        <div class="order-card-header">
          <div class="order-number">#${order.orderNumber}</div>
          <div class="order-status" style="background:${statusColors[order.status] || '#666'}20; color:${statusColors[order.status] || '#666'}; border:1px solid ${statusColors[order.status] || '#666'}40">
            ${statusLabels[order.status] || order.status}
          </div>
        </div>
        <div class="order-body">
          <div class="order-field">
            <label>${t().customer}</label>
            <span>${order.customerName || order.fileName}</span>
          </div>
          <div class="order-field">
            <label>${t().assignDate}</label>
            <input type="date" class="date-input" value="${order.serviceDate || ''}" 
              onchange="updateServiceDate('${order.id}', this.value)">
          </div>
          <div class="order-field">
            <label>${t().team}</label>
            <select class="team-select" onchange="assignTeam('${order.id}', this.value, '${order.serviceDate || getTomorrow()}')">
              <option value="">${t().selectTeam}</option>
              ${TEAMS.map(tm => `<option value="${tm.id}" ${order.teamId === tm.id ? 'selected' : ''}>${tm.name}</option>`).join('')}
            </select>
          </div>
          ${team ? `<div class="team-badge" style="background:${team.color}20; color:${team.color}; border:1px solid ${team.color}40">● ${team.name}</div>` : ''}
        </div>
        <div class="order-actions">
          ${order.pdfUrl ? `<a href="${order.pdfUrl}" target="_blank" class="btn-sm btn-view">📄 PDF</a>` : ''}

            <option value="">${currentLang==='da'?'Alle statuser':'All statuses'}</option>

  function filterReports() {
    const search = document.getElementById('reportSearch')?.value.toLowerCase() || '';
    const team = document.getElementById('reportTeamFilter')?.value || '';
    const status = document.getElementById('reportStatusFilter')?.value || '';
    const filtered = reportsData.filter(r => {
      const matchSearch = !search ||
        (r.orderNumber||'').toLowerCase().includes(search) ||
        (r.customerName||'').toLowerCase().includes(search) ||
        (r.teamName||'').toLowerCase().includes(search);
      const matchTeam = !team || r.teamId === team;
      const matchStatus = !status || r.serviceStatus === status;
      return matchSearch && matchTeam && matchStatus;
    });
    const list = document.getElementById('reportsList');
    if (list) list.innerHTML = filtered.length
      ? filtered.map(r => renderReportRow(r)).join('')
      : '<div class="empty-state"><p>' + (currentLang==='da'?'Ingen resultater':'No results') + '</p></div>';
  }

  function exportReportsCSV() {
    const headers = ['Ordre','Kunde','Adresse','Team','Status','Start','Slut','Timer','Montører','Kommentarer','Dato'];
    const rows = reportsData.map(r => [
      r.orderNumber||'', r.customerName||'', r.customerAddress1||'',
      r.teamName||'', r.serviceStatus||'', r.startTime||'', r.endTime||'',
      r.hoursSpent||'', r.numAssemblers||'', (r.comments||'').replace(/,/g,' '),
      r.completedAt ? new Date(r.completedAt).toLocaleDateString('da-DK') : ''
    ]);
    const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = 'rapporter_' + new Date().toLocaleDateString('da-DK').replace(/\//g,'-') + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('CSV eksporteret', 'success');
  }
  window.exportReportsCSV = exportReportsCSV;

  function loadCheckins() {
    const q = query(collection(db, 'orders'),
      where('status', 'in', ['inProgress', 'completed', 'failed']));
    onSnapshot(q, snap => {
      const tbody = document.getElementById('checkinBody');
      if (!tbody) return;
      const rows = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a,b) => (b.arrivedAt||b.uploadedAt||'') > (a.arrivedAt||a.uploadedAt||'') ? 1 : -1);
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;opacity:.4;padding:2rem">${currentLang==='da'?'Ingen aktive jobs':'No active jobs'}</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(o => {
        const team = TEAMS.find(t => t.id === o.teamId);
        const statusMap = {
          inProgress: `<span class="checkin-status working">● ${currentLang==='da'?'I gang':'Working'}</span>`,
          completed: `<span class="checkin-status done">✓ ${currentLang==='da'?'Færdig':'Done'}</span>`,
          failed: `<span class="checkin-status" style="background:var(--danger)15;color:var(--danger)">✕ ${currentLang==='da'?'Fejlet':'Failed'}</span>`,
        };
        const fmtTime = iso => iso ? new Date(iso).toLocaleTimeString('da-DK',{hour:'2-digit',minute:'2-digit'}) : '—';
        const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('da-DK',{day:'2-digit',month:'2-digit'}) : '—';
        return `<tr>
          <td>${team ? `<span style="color:${team.color}">● ${team.name}</span>` : '—'}</td>
          <td>${o.customerName||'—'}<br><span style="font-size:.75rem;opacity:.5">${o.customerAddress1||''}</span></td>
          <td style="font-family:'Space Mono',monospace;font-size:.8rem">#${o.orderNumber||'—'}</td>
          <td>${statusMap[o.status]||o.status}</td>
          <td class="checkin-time">${o.arrivedAt ? fmtDate(o.arrivedAt)+' '+fmtTime(o.arrivedAt) : '—'}</td>
          <td class="checkin-time">${o.completedAt ? fmtDate(o.completedAt)+' '+fmtTime(o.completedAt) : '—'}</td>
        </tr>`;
      }).join('');
    });
    setSyncState('synced');
  }


  // ── CLEAR ALL DATA ───────────────────────────────────────────
  const SECRET_DELETE_CODE = "SLET2024";
  const SECRET_RECOVERY_CODE = "ADMIN2024";

  function showClearDataModal() {
    const modal = document.createElement('div');
    modal.id = 'clearDataModal';
    modal.style.cssText = 'position:fixed;inset:0;background:#000000AA;z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem';
    modal.innerHTML = `
      <div style="background:var(--surface);border:2px solid var(--danger);border-radius:20px;padding:2rem;max-width:420px;width:100%">
        <div style="font-size:2.5rem;text-align:center;margin-bottom:1rem">⚠️</div>
        <h2 style="color:var(--danger);text-align:center;margin-bottom:.5rem">${currentLang==='da'?'Slet alle data':'Delete all data'}</h2>
        <p style="color:var(--text2);font-size:.85rem;text-align:center;margin-bottom:1.5rem">
          ${currentLang==='da'?'Dette sletter ALLE ordrer, rapporter og lokationer permanent. Handling kan ikke fortrydes.':'This permanently deletes ALL orders, reports and locations. This cannot be undone.'}
        </p>
        <label style="display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:.4rem">
          ${currentLang==='da'?'Indtast sletningskode':'Enter delete code'}
        </label>
        <input id="deleteCodeInput" type="password" placeholder="••••••••"
          style="width:100%;padding:.8rem;background:var(--surface2);border:1px solid var(--danger)50;border-radius:10px;color:var(--text);font-family:inherit;font-size:1rem;margin-bottom:1rem">
        <div style="display:flex;gap:.75rem">
          <button onclick="document.getElementById('clearDataModal').remove()"
            style="flex:1;padding:.8rem;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;font-family:inherit">
            ${currentLang==='da'?'Annuller':'Cancel'}
          </button>
          <button onclick="confirmClearData()"
            style="flex:1;padding:.8rem;background:var(--danger);border:none;border-radius:10px;color:white;cursor:pointer;font-family:inherit;font-weight:700">
            ${currentLang==='da'?'Slet alt':'Delete all'}
          </button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('deleteCodeInput').focus();
  }
  window.showClearDataModal = showClearDataModal;

  async function confirmClearData() {
    const code = document.getElementById('deleteCodeInput')?.value;
    if (code !== SECRET_DELETE_CODE) {
      showToast(currentLang==='da'?'Forkert kode':'Wrong code', 'error');
      return;
    }
    document.getElementById('clearDataModal').remove();
    showToast(currentLang==='da'?'Sletter data...':'Deleting data...', 'info');
    try {
      const cols = ['orders','reports','locations','mail'];
      for (const col of cols) {
        const snap = await getDocs(collection(db, col));
        const deletes = snap.docs.map(d => deleteDoc(doc(db, col, d.id)));
        await Promise.all(deletes);
      }
      showToast(currentLang==='da'?'Alle data slettet':'All data deleted', 'success');
      navigateTo('orders');
    } catch(e) {
      showToast('Fejl: ' + e.message, 'error');
    }
  }
  window.confirmClearData = confirmClearData;

  // ── FORGOT PASSWORD ──────────────────────────────────────────
  function showForgotModal() {
    const modal = document.createElement('div');
    modal.id = 'forgotModal';
    modal.style.cssText = 'position:fixed;inset:0;background:#000000AA;z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem';
    modal.innerHTML = `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;max-width:400px;width:100%">
        <h2 style="margin-bottom:.5rem">${currentLang==='da'?'Glemt adgangskode':'Forgot password'}</h2>
        <p style="color:var(--text2);font-size:.85rem;margin-bottom:1.5rem">
          ${currentLang==='da'?'Indtast gendannelseskoden for at nulstille din adgangskode.':'Enter the recovery code to reset your password.'}
        </p>
        <label style="display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:.4rem">
          ${currentLang==='da'?'Gendannelseskode':'Recovery code'}
        </label>
        <input id="recoveryCodeInput" type="password" placeholder="••••••••"
          style="width:100%;padding:.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:1rem;margin-bottom:.75rem">
        <label style="display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:.4rem">
          ${currentLang==='da'?'Ny adgangskode':'New password'}
        </label>
        <input id="newPasswordInput" type="password" placeholder="••••••••"
          style="width:100%;padding:.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:1rem;margin-bottom:1rem">
        <div style="display:flex;gap:.75rem">
          <button onclick="document.getElementById('forgotModal').remove()"
            style="flex:1;padding:.8rem;background:none;border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;font-family:inherit">
            ${currentLang==='da'?'Annuller':'Cancel'}
          </button>
          <button onclick="confirmPasswordReset()"
            style="flex:1;padding:.8rem;background:var(--accent);border:none;border-radius:10px;color:white;cursor:pointer;font-family:inherit;font-weight:700">
            ${currentLang==='da'?'Nulstil':'Reset'}
          </button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
  }
  window.showForgotModal = showForgotModal;

  async function confirmPasswordReset() {
    const code = document.getElementById('recoveryCodeInput')?.value;
    const newPw = document.getElementById('newPasswordInput')?.value;
    if (code !== SECRET_RECOVERY_CODE) {
      showToast(currentLang==='da'?'Forkert gendannelseskode':'Wrong recovery code', 'error');
      return;
    }
    if (!newPw || newPw.length < 6) {
      showToast(currentLang==='da'?'Adgangskode skal være mindst 6 tegn':'Password must be at least 6 characters', 'error');
      return;
    }
    try {
      const { updatePassword } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
      await updatePassword(auth.currentUser, newPw);
      document.getElementById('forgotModal').remove();
      showToast(currentLang==='da'?'Adgangskode opdateret!':'Password updated!', 'success');
    } catch(e) {
      showToast('Fejl: ' + e.message, 'error');
    }
  }
  window.confirmPasswordReset = confirmPasswordReset;

  function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
  }

  function toggleLang() {
    currentLang = currentLang === 'da' ? 'en' : 'da';
    localStorage.setItem('sl_lang', currentLang);
    if (isLoggedIn) { renderNav(); navigateTo(currentView); }
    else renderLoginScreen();
  }

  function renderLoginScreen() {
    document.getElementById('loginTitle').textContent = t().adminLogin;
    document.getElementById('loginSubtitle').textContent = t().welcomeBack;
    document.getElementById('loginBtn').textContent = t().login;
    document.getElementById('loginPwLabel').textContent = t().password;
  }

  // Expose to global scope for inline handlers
  window.navigateTo = navigateTo;
  window.assignTeam = assignTeam;
  window.deleteOrder = deleteOrder;
  window.updateServiceDate = updateServiceDate;
  window.viewReport = openReportModal;
  window.openReportModal = openReportModal;
  window.closeModal = closeModal;
  window.openPhoto = openPhoto;
  window.toggleLang = toggleLang;
  window.login = login;
  window.logout = logout;

  // Init
  document.addEventListener('DOMContentLoaded', () => {
    applyTheme();
    initFirebase();
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('loginPw').addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
    document.getElementById('photoOverlay').onclick = () => {
      document.getElementById('photoOverlay').style.display = 'none';
    };
    document.getElementById('reportModal').onclick = e => {
      if (e.target === document.getElementById('reportModal')) closeModal();
    };
    renderLoginScreen();
  });
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0A0A0F;
    --surface: #12121A;
    --surface2: #1A1A26;
    --border: #2A2A3E;
    --accent: #E86B3E;
    --accent2: #3E8BE8;
    --text: #F0F0F8;
    --text2: #8888A8;
    --success: #3EBE6B;
    --danger: #E83E3E;
    --warning: #E8A83E;
    --radius: 12px;
    --nav-w: 220px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; overflow: hidden; }

  /* LOGIN */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; background: var(--bg);
    background-image: radial-gradient(ellipse at 20% 50%, #E86B3E0A 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, #3E8BE80A 0%, transparent 60%);
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 3rem; width: 380px; max-width: 90vw;
    box-shadow: 0 40px 80px #00000060;
  }
  .login-logo { font-family: 'Space Mono', monospace; font-size: 1.5rem; color: var(--accent); margin-bottom: .5rem; }
  .login-title { font-size: 1.6rem; font-weight: 700; margin-bottom: .25rem; }
  .login-subtitle { color: var(--text2); margin-bottom: 2rem; }
  .login-label { display: block; font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; color: var(--text2); margin-bottom: .5rem; }
  .login-input {
    width: 100%; padding: .85rem 1rem; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-size: 1rem; font-family: inherit;
    transition: border-color .2s;
  }
  .login-input:focus { outline: none; border-color: var(--accent); }
  .login-btn {
    width: 100%; margin-top: 1.5rem; padding: .9rem;
    background: var(--accent); border: none; border-radius: var(--radius);
    color: white; font-size: 1rem; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: opacity .2s, transform .1s;
  }
  .login-btn:hover { opacity: .9; }
  .login-btn:active { transform: scale(.99); }
  .login-lang { margin-top: 1rem; text-align: center; }
  .login-lang button { background: none; border: none; color: var(--text2); cursor: pointer; font-family: inherit; font-size: .85rem; }

  /* APP SHELL */
  #appScreen { display: none; height: 100vh; flex-direction: column; }

  /* NAV */
  #navBar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 1rem; padding: 0 1.5rem;
    height: 60px; flex-shrink: 0; overflow-x: auto;
  }
  .nav-brand { display: flex; align-items: center; gap: .5rem; margin-right: 1rem; flex-shrink: 0; }
  .brand-icon { font-size: 1.2rem; }
  .brand-name { font-family: 'Space Mono', monospace; font-size: .9rem; font-weight: 700; }
  .brand-role { font-size: .65rem; background: var(--accent); color: white; padding: .2rem .5rem; border-radius: 999px; }
  .nav-items { display: flex; gap: .25rem; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: .4rem; padding: .5rem .9rem;
    background: none; border: none; color: var(--text2); cursor: pointer;
    border-radius: 8px; font-family: inherit; font-size: .85rem;
    transition: all .15s; white-space: nowrap;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent)15; color: var(--accent); }
  .nav-actions { display: flex; align-items: center; gap: .75rem; flex-shrink: 0; }
  .lang-toggle {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: .35rem .75rem; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: .8rem;
  }
  .logout-btn {
    background: none; border: 1px solid var(--border); color: var(--text2);
    padding: .35rem .75rem; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: .8rem;
    transition: all .15s;
  }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* MAIN */
  #mainContent { flex: 1; overflow-y: auto; padding: 1.5rem; }

  .page-header { margin-bottom: 1.5rem; }
  .page-header h1 { font-size: 1.6rem; font-weight: 700; }

  .stats-row { display: flex; gap: .75rem; margin-top: 1rem; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: .6rem 1rem; min-width: 100px;
  }
  .stat-chip span { display: block; font-size: 1.5rem; font-weight: 700; font-family: 'Space Mono', monospace; }
  .stat-chip label { font-size: .7rem; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; }
  .stat-chip.completed { border-color: var(--success)40; }
  .stat-chip.completed span { color: var(--success); }
  .stat-chip.pending { border-color: var(--warning)40; }
  .stat-chip.pending span { color: var(--warning); }
  .stat-chip.active { border-color: var(--accent2)40; }
  .stat-chip.active span { color: var(--accent2); }

  /* ORDERS */
  .section-title { font-size: .85rem; text-transform: uppercase; letter-spacing: .1em; color: var(--text2); margin-bottom: 1rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border); }
  .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; transition: border-color .2s; }
  .order-card:hover { border-color: var(--accent)40; }
  .order-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .order-number { font-family: 'Space Mono', monospace; font-size: .9rem; font-weight: 700; }
  .order-status { font-size: .7rem; padding: .25rem .6rem; border-radius: 999px; font-weight: 600; }
  .order-body { display: flex; flex-direction: column; gap: .6rem; margin-bottom: 1rem; }
  .order-field label { display: block; font-size: .7rem; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .25rem; }
  .order-field span { font-size: .9rem; }
  .date-input, .team-select {
    width: 100%; padding: .5rem .75rem; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-family: inherit; font-size: .85rem; cursor: pointer;
  }
  .date-input:focus, .team-select:focus { outline: none; border-color: var(--accent); }
  .team-badge { font-size: .75rem; padding: .3rem .6rem; border-radius: 6px; display: inline-block; margin-top: .25rem; }
  .order-actions { display: flex; gap: .5rem; flex-wrap: wrap; }
  .btn-sm { padding: .35rem .75rem; border-radius: 6px; border: none; cursor: pointer; font-size: .75rem; font-family: inherit; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: .3rem; transition: opacity .15s; }
  .btn-sm:hover { opacity: .8; }
  .btn-view { background: var(--accent2)15; color: var(--accent2); border: 1px solid var(--accent2)30; }
  .btn-report { background: var(--success)15; color: var(--success); border: 1px solid var(--success)30; }
  .btn-delete { background: var(--danger)15; color: var(--danger); border: 1px solid var(--danger)30; }

  /* UPLOAD */
  .upload-container { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; max-width: 900px; }
  @media (max-width: 700px) { .upload-container { grid-template-columns: 1fr; } }
  .upload-area {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 4rem 2rem; text-align: center; cursor: pointer;
    transition: all .2s; background: var(--surface);
  }
  .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: var(--accent)08; }
  .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
  .upload-title { font-size: 1rem; font-weight: 600; margin-bottom: .5rem; }
  .upload-sub { color: var(--text2); font-size: .85rem; }
  .upload-processing { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .spin { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .upload-help { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
  .upload-help h3 { margin-bottom: .75rem; }
  .upload-help p { color: var(--text2); font-size: .85rem; line-height: 1.6; }

  /* REPORTS */
  .reports-list { display: flex; flex-direction: column; gap: .75rem; }
  .report-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; transition: border-color .2s;
  }
  .report-row:hover { border-color: var(--accent)40; }
  .report-info { display: flex; align-items: center; gap: 1.5rem; }
  .report-order { font-family: 'Space Mono', monospace; font-size: .9rem; font-weight: 700; min-width: 120px; }
  .report-customer { font-size: .9rem; }
  .report-date { font-size: .8rem; color: var(--text2); }
  .report-right { display: flex; align-items: center; gap: 1rem; }
  .report-status { font-size: .75rem; padding: .2rem .6rem; border-radius: 999px; }
  .report-status.completed { background: var(--success)15; color: var(--success); }
  .report-status.failed { background: var(--danger)15; color: var(--danger); }
  .chevron { color: var(--text2); font-size: 1.2rem; }

  /* MAP */
  .map-layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; height: calc(100vh - 200px); }
  @media (max-width: 700px) { .map-layout { grid-template-columns: 1fr; height: auto; } }
  .team-locations-list { display: flex; flex-direction: column; gap: .75rem; overflow-y: auto; }
  .location-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; display: flex; gap: .75rem; }
  .team-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: .25rem; flex-shrink: 0; }
  .location-info { flex: 1; }
  .location-team { font-weight: 600; margin-bottom: .25rem; }
  .location-coords { font-family: 'Space Mono', monospace; font-size: .75rem; color: var(--text2); }
  .location-time { font-size: .75rem; color: var(--text2); margin-bottom: .5rem; }
  .map-placeholder { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; }
  .map-note { text-align: center; padding: 2rem; max-width: 300px; }
  .map-note p { color: var(--text2); margin-top: .75rem; line-height: 1.6; font-size: .9rem; }

  /* MODAL */
  #reportModal {
    display: none; position: fixed; inset: 0;
    background: #00000080; z-index: 100;
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; width: 100%; max-width: 700px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-header h2 { font-size: 1.2rem; }
  .modal-close { background: none; border: none; color: var(--text2); font-size: 1.2rem; cursor: pointer; }
  .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .report-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 500px) { .report-detail-grid { grid-template-columns: 1fr; } }
  .detail-section { background: var(--surface2); border-radius: 10px; padding: 1rem; }
  .detail-section h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text2); margin-bottom: .5rem; }
  .detail-section p { font-size: .9rem; line-height: 1.5; }
  .disclaimer-section { border: 1px solid var(--warning)40; background: var(--warning)08; }
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: .5rem; }
  .thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; cursor: pointer; transition: transform .15s; }
  .thumb:hover { transform: scale(1.05); }
  .sig-preview { width: 100%; max-width: 300px; border-radius: 8px; border: 1px solid var(--border); background: white; }

  /* PHOTO OVERLAY */
  #photoOverlay { display: none; position: fixed; inset: 0; background: #000000E0; z-index: 200; align-items: center; justify-content: center; }
  #fullPhoto { max-width: 95vw; max-height: 95vh; border-radius: 8px; }

  /* TOAST */
  #toastContainer { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300; display: flex; flex-direction: column; gap: .5rem; }
  .toast { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1.25rem; font-size: .85rem; transform: translateY(20px); opacity: 0; transition: all .3s; max-width: 300px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-success { border-color: var(--success)50; color: var(--success); }
  .toast-error { border-color: var(--danger)50; color: var(--danger); }

  .empty { color: var(--text2); padding: 2rem; text-align: center; }
  .empty-state { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 3rem; text-align: center; color: var(--text2); }

  /* ── LIGHT MODE ──────────────────────────────────────────── */
  body.light {
    --bg: #F4F4F8;
    --surface: #FFFFFF;
    --surface2: #EEEEF4;
    --border: #DDDDE8;
    --text: #0A0A18;
    --text2: #6666880;
  }
  body.light { --text2: #666688; }

  .theme-toggle {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: .3rem .5rem;
    cursor: pointer; display: flex; align-items: center; gap: .3rem;
    font-size: .8rem; color: var(--text2); transition: all .2s;
    white-space: nowrap;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SYNC INDICATOR ─────────────────────────────────────── */
  .sync-bar {
    display: flex; align-items: center; gap: .5rem;
    padding: .3rem .75rem; border-radius: 20px;
    font-size: .75rem; font-weight: 600; transition: all .3s;
    white-space: nowrap;
  }
  .sync-bar.synced { background: var(--success)15; color: var(--success); border: 1px solid var(--success)30; }
  .sync-bar.syncing { background: var(--warning)15; color: var(--warning); border: 1px solid var(--warning)30; }
  .sync-bar.offline { background: var(--danger)15; color: var(--danger); border: 1px solid var(--danger)30; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .sync-dot.pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── INSTALL PROMPT ─────────────────────────────────────── */
  .install-banner {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--accent)50;
    border-radius: 14px; padding: 1rem 1.25rem;
    display: flex; align-items: center; gap: 1rem;
    box-shadow: 0 8px 32px #00000030; z-index: 200;
    width: calc(100% - 2rem); max-width: 420px;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
  .install-banner-text { flex: 1; }
  .install-banner-text strong { display: block; font-size: .9rem; margin-bottom: .15rem; }
  .install-banner-text span { font-size: .78rem; color: var(--text2); }
  .install-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: .5rem 1rem; font-size: .85rem; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .install-dismiss { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.1rem; padding: .2rem; }

  /* ── CHECK-IN TABLE ─────────────────────────────────────── */
  .checkin-table { width: 100%; border-collapse: collapse; }
  .checkin-table th { text-align: left; font-size: .72rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text2); padding: .5rem .75rem; border-bottom: 1px solid var(--border); }
  .checkin-table td { padding: .7rem .75rem; border-bottom: 1px solid var(--border); font-size: .85rem; }
  .checkin-table tr:last-child td { border-bottom: none; }
  .checkin-table tr:hover td { background: var(--surface2); }
  .checkin-status { display: inline-flex; align-items: center; gap: .4rem; font-size: .75rem; font-weight: 600; padding: .2rem .6rem; border-radius: 999px; }
  .checkin-status.arrived { background: var(--success)15; color: var(--success); }
  .checkin-status.working { background: var(--accent2)15; color: var(--accent2); }
  .checkin-status.done { background: var(--text2)15; color: var(--text2); }
  .checkin-time { font-family: "Space Mono", monospace; font-size: .78rem; color: var(--text2); }


  .report-controls { display:flex; gap:.75rem; margin-top:1rem; flex-wrap:wrap; align-items:center; }
  .search-input {
    flex:1; min-width:180px; padding:.55rem .9rem;
    background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:inherit; font-size:.85rem;
  }
  .search-input:focus { outline:none; border-color:var(--accent); }
  .filter-select {
    padding:.55rem .75rem; background:var(--surface2);
    border:1px solid var(--border); border-radius:8px;
    color:var(--text); font-family:inherit; font-size:.85rem; cursor:pointer;
  }
  .filter-select:focus { outline:none; border-color:var(--accent); }

</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">⚡ Smart Logistics</div>
    <div class="login-title" id="loginTitle">Administrator Login</div>
    <div class="login-subtitle" id="loginSubtitle">Velkommen tilbage</div>
    <label class="login-label" id="loginPwLabel">Adgangskode</label>
    <input type="password" class="login-input" id="loginPw" placeholder="••••••••">
    <button class="login-btn" id="loginBtn">Log ind</button>
    <div class="login-lang" style="margin-top:.5rem">
      <button onclick="showForgotModal()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-family:inherit;font-size:.8rem">
        🔑 Glemt adgangskode?
      </button>
    </div>
    <div class="login-lang">
      <button onclick="toggleLang()">🌐 Skift sprog / Change language</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <nav id="navBar"></nav>
  <main id="mainContent"></main>
</div>

<!-- REPORT MODAL -->
<div id="reportModal">
  <div class="modal-card">
    <div id="reportModalContent"></div>
  </div>
</div>

<!-- PHOTO OVERLAY -->
<div id="photoOverlay">
  <img id="fullPhoto" src="" alt="Foto">
</div>

<!-- TOASTS -->
<div id="toastContainer"></div>

</body>
</html>
