<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Smart Logistics — Team</title>
<link rel="manifest" href="team-manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, addDoc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
  import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

  // ── CONFIG ──────────────────────────────────────────────
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyDl3LaBoekT87gecZpKPmLpFBdN-uRU3jc",
    authDomain: "smart-logsiti.firebaseapp.com",
    projectId: "smart-logsiti",
    storageBucket: "smart-logsiti.firebasestorage.app",
    messagingSenderId: "488223912684",
    appId: "1:488223912684:web:765b56571cb7407b512bc9"
  };

  const ADMIN_EMAIL = "taim@smartlogistics.dk";

  const TEAMS = [
    { id: "team1", name: "Team 1", password: "team1pass", color: "#E86B3E" },
    { id: "team2", name: "Team 2", password: "team2pass", color: "#3E8BE8" },
    { id: "team3", name: "Team 3", password: "team3pass", color: "#3EBE6B" },
    { id: "team4", name: "Team 4", password: "team4pass", color: "#BE3E8B" },
    { id: "team5", name: "Team 5", password: "team5pass", color: "#8BBE3E" },
  ];

  const LANG = {
    da: {
      login: "Log ind", logout: "Log ud", team: "Team", password: "Adgangskode",
      myOrders: "Mine opgaver", tomorrow: "I morgen", today: "I dag",
      noOrders: "Ingen opgaver tildelt", orderNum: "Ordrenr.",
      customer: "Kunde", address: "Adresse", articles: "Artikler",
      startJob: "Start job", arrivedBtn: "Jeg er ankommet",
      takeBeforePhotos: "Tag FØR-billeder", takeAfterPhotos: "Tag EFTER-billeder",
      fillReport: "Udfyld servicerapport", submitReport: "Indsend rapport",
      serviceCompleted: "Service udført", serviceFailed: "Service fejlet",
      serviceIncomplete: "Service ufuldstændig", failReason: "Årsag til fejl",
      incompleteReason: "Årsag til ufuldstændig",
      customerNotHome: "Kunde ikke hjemme", articlesMissing: "Manglende artikler",
      noCapacity: "Ingen/utilstrækkelig kapacitet",
      inappropriateConditions: "Upassende serviceforhold",
      paymentProblems: "Betalingsproblemer", incorrectArticles: "Forkerte artikler",
      damagedArticles: "Beskadigede artikler", preNotCorrect: "Formålinger forkerte",
      salesError: "Salg-fejl", installError: "Monteringsfejl",
      changedMind: "Ombestemt sig", comments: "Kommentarer",
      techSignature: "Montør underskrift", customerSignature: "Kunde underskrift",
      disclaimerTitle: "Ansvarsfraskrivelse", disclaimerText: "Kunden ønsker ikke at skabene fastgøres til væggen og fraskriver sig hermed ethvert ansvar for skader, personskader eller tab som følge af manglende vægmontering.",
      disclaimerSign: "Kunden accepterer og underskriver",
      wallMount: "Kunden vil ikke have skabe fastgjort til væg?",
      yes: "Ja", no: "Nej", save: "Gem", submit: "Indsend",
      photosBefore: "Billeder FØR arbejdet", photosAfter: "Billeder EFTER arbejdet",
      addPhoto: "Tilføj billede", photoSaved: "Billede gemt",
      reportSent: "Rapport sendt!", saving: "Gemmer...",
      startTime: "Starttid", endTime: "Sluttid",
      hours: "Timer brugt", assemblers: "Antal montører",
      additionalServices: "Yderligere services påkrævet?",
      contactedIkea: "Kontaktet IKEA?", ikeaRef: "IKEA reference nr.",
      satisfactionYes: "Udført til kundens tilfredshed",
      language: "Sprog", viewPDF: "Se PDF",
      status: "Status", pending: "Afventer", inProgress: "I gang",
      completed: "Færdig", failed: "Fejlet",
      arrivedConfirm: "Ankomst registreret!", reportSubmitted: "Rapport indsendt!",
      signHere: "Underskriv her", clearSig: "Ryd",
      step1: "Ankomst & Før-billeder", step2: "Arbejde", step3: "Rapport",
    },
    en: {
      login: "Login", logout: "Log out", team: "Team", password: "Password",
      myOrders: "My tasks", tomorrow: "Tomorrow", today: "Today",
      noOrders: "No tasks assigned", orderNum: "Order no.",
      customer: "Customer", address: "Address", articles: "Articles",
      startJob: "Start job", arrivedBtn: "I have arrived",
      takeBeforePhotos: "Take BEFORE photos", takeAfterPhotos: "Take AFTER photos",
      fillReport: "Fill service report", submitReport: "Submit report",
      serviceCompleted: "Service completed", serviceFailed: "Service failed",
      serviceIncomplete: "Service incomplete", failReason: "Reason for failure",
      incompleteReason: "Reason for incomplete",
      customerNotHome: "Customer not home", articlesMissing: "Articles missing",
      noCapacity: "No/not enough capacity",
      inappropriateConditions: "Inappropriate service conditions",
      paymentProblems: "Payment problems", incorrectArticles: "Incorrect articles",
      damagedArticles: "Damaged articles", preNotCorrect: "Pre-measurements incorrect",
      salesError: "Sales error", installError: "Installation error",
      changedMind: "Changed mind", comments: "Comments",
      techSignature: "Technician signature", customerSignature: "Customer signature",
      disclaimerTitle: "Disclaimer / Ansvarsfraskrivelse",
      disclaimerText: "The customer does not wish the cabinets to be wall-mounted and hereby disclaims all responsibility for damage, injury or loss resulting from the lack of wall mounting.",
      disclaimerSign: "Customer accepts and signs",
      wallMount: "Customer refuses wall mounting?",
      yes: "Yes", no: "No", save: "Save", submit: "Submit",
      photosBefore: "Photos BEFORE work", photosAfter: "Photos AFTER work",
      addPhoto: "Add photo", photoSaved: "Photo saved",
      reportSent: "Report sent!", saving: "Saving...",
      startTime: "Start time", endTime: "End time",
      hours: "Hours spent", assemblers: "Number of assemblers",
      additionalServices: "Additional services required?",
      contactedIkea: "Contacted IKEA?", ikeaRef: "IKEA reference no.",
      satisfactionYes: "Completed to customer satisfaction",
      language: "Language", viewPDF: "View PDF",
      status: "Status", pending: "Pending", inProgress: "In progress",
      completed: "Completed", failed: "Failed",
      arrivedConfirm: "Arrival registered!", reportSubmitted: "Report submitted!",
      signHere: "Sign here", clearSig: "Clear",
      step1: "Arrival & Before photos", step2: "Work", step3: "Report",
    }
  };

  let app, db, storage;
  let currentLang = localStorage.getItem('sl_lang') || 'da';
  let currentTeam = null;
  let myOrders = [];
  let currentOrder = null;
  let currentStep = 'list'; // list | job
  let jobStep = 1; // 1=arrival+before, 2=work, 3=report
  let beforePhotos = [];
  let afterPhotos = [];
  let techSigData = null;
  let customerSigData = null;
  let disclaimerSigData = null;
  let sigCanvas = null, sigCtx = null, sigDrawing = false;
  let activeSigTarget = null;
  let gpsWatcher = null;
  let unsubOrders = null;

  const t = () => LANG[currentLang];
  const tomorrow = () => { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; };
  const today = () => new Date().toISOString().split('T')[0];

  function initFirebase() {
    try {
      app = initializeApp(FIREBASE_CONFIG);
      db = getFirestore(app);
      storage = getStorage(app);
    } catch(e) {
      showToast('Firebase ikke konfigureret', 'error');
    }
  }

  // ── AUTH ────────────────────────────────────────────────────
  function login() {
    const teamSel = document.getElementById('teamSelect').value;
    const pw = document.getElementById('teamPw').value;
    const team = TEAMS.find(t => t.id === teamSel);
    if (!team) { showToast('Vælg et team', 'error'); return; }
    if (pw !== team.password) { showToast('Forkert adgangskode', 'error'); return; }
    currentTeam = team;
    localStorage.setItem('sl_team', JSON.stringify(team));
    showApp();
    startOrderListener();
    startGPS();
  }

  function logout() {
    if (unsubOrders) unsubOrders();
    if (gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
    currentTeam = null;
    localStorage.removeItem('sl_team');
    currentOrder = null;
    currentStep = 'list';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }

  function tryAutoLogin() {
    const saved = localStorage.getItem('sl_team');
    if (saved) {
      currentTeam = JSON.parse(saved);
      showApp();
      startOrderListener();
      startGPS();
    }
  }

  // ── GPS ─────────────────────────────────────────────────────
  function startGPS() {
    if (!navigator.geolocation) return;
    gpsWatcher = navigator.geolocation.watchPosition(pos => {
      if (!currentTeam || !db) return;
      setDoc(doc(db, 'locations', currentTeam.id), {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        timestamp: new Date().toISOString(),
        teamName: currentTeam.name
      }).catch(() => {});
    }, null, { enableHighAccuracy: true, maximumAge: 30000 });
  }

  // ── ORDERS ──────────────────────────────────────────────────
  function startOrderListener() {
    if (!db || !currentTeam) return;
    const q = query(collection(db, 'orders'), where('teamId', '==', currentTeam.id));
    unsubOrders = onSnapshot(q, snap => {
      myOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(o => o.serviceDate === tomorrow() || o.serviceDate === today())
        .sort((a, b) => (a.serviceDate > b.serviceDate ? 1 : -1));
      if (currentStep === 'list') renderOrderList();
    });
  }

  // ── SHOW APP ────────────────────────────────────────────────
  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    renderHeader();
    renderOrderList();
  }

  function renderHeader() {
    document.getElementById('appHeader').innerHTML = `
      <div class="header-brand">
        <span style="font-size:1.2rem">⚡</span>
        <span class="header-title">Smart Logistics</span>
      </div>
      <div class="header-right">
        <div class="team-pill" style="background:${currentTeam.color}20; color:${currentTeam.color}; border:1px solid ${currentTeam.color}40">
          ● ${currentTeam.name}
        </div>
        <button class="icon-btn" onclick="toggleLang()" title="Sprog">🌐</button>
        <button class="icon-btn" onclick="logout()" title="Log ud">↩</button>
      </div>
    `;
  }

  // ── ORDER LIST ──────────────────────────────────────────────
  function renderOrderList() {
    currentStep = 'list';
    const main = document.getElementById('mainContent');
    const todayOrders = myOrders.filter(o => o.serviceDate === today());
    const tomorrowOrders = myOrders.filter(o => o.serviceDate === tomorrow());

    main.innerHTML = `
      <div class="list-header">
        <h1>${t().myOrders}</h1>
      </div>
      ${todayOrders.length ? `
        <div class="day-section">
          <div class="day-label">📅 ${t().today}</div>
          ${todayOrders.map(o => renderOrderCard(o)).join('')}
        </div>` : ''}
      ${tomorrowOrders.length ? `
        <div class="day-section">
          <div class="day-label">📅 ${t().tomorrow}</div>
          ${tomorrowOrders.map(o => renderOrderCard(o)).join('')}
        </div>` : ''}
      ${!myOrders.length ? `<div class="empty-state"><div style="font-size:3rem">📭</div><p>${t().noOrders}</p></div>` : ''}
    `;
  }

  function renderOrderCard(order) {
    const statusColors = { pending:'#E8A83E', inProgress:'#3E8BE8', completed:'#3EBE6B', failed:'#E83E3E', uploaded:'#888' };
    const statusLabels = { pending:t().pending, inProgress:t().inProgress, completed:t().completed, failed:t().failed, uploaded:t().pending };
    const color = statusColors[order.status] || '#888';
    const canStart = order.status !== 'completed' && order.status !== 'failed';

    return `
      <div class="order-card-team" onclick="${canStart ? `openJob('${order.id}')` : ''}">
        <div class="order-card-top">
          <div>
            <div class="order-num-team">#${order.orderNumber}</div>
            <div class="order-customer-team">${order.customerName || order.fileName}</div>
          </div>
          <div class="status-dot" style="background:${color}20; color:${color}; border:1px solid ${color}40">${statusLabels[order.status] || order.status}</div>
        </div>
        ${order.customerAddress ? `<div class="order-address-team">📍 ${order.customerAddress}</div>` : ''}
        <div class="order-actions-team">
          ${order.pdfUrl ? `<a href="${order.pdfUrl}" target="_blank" class="card-btn btn-pdf" onclick="event.stopPropagation()">📄 PDF</a>` : ''}
          ${canStart ? `<div class="card-btn btn-start">${order.status === 'inProgress' ? '▶ Fortsæt' : t().startJob} →</div>` : `<div class="card-btn btn-done">✓ ${t().completed}</div>`}
        </div>
      </div>
    `;
  }

  // ── JOB FLOW ─────────────────────────────────────────────────
  function openJob(orderId) {
    currentOrder = myOrders.find(o => o.id === orderId);
    if (!currentOrder) return;
    beforePhotos = currentOrder.beforePhotos || [];
    afterPhotos = currentOrder.afterPhotos || [];
    jobStep = currentOrder.jobStep || 1;
    currentStep = 'job';
    renderJobView();
  }

  function renderJobView() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
      <div class="job-header">
        <button class="back-btn" onclick="renderOrderList()">← Tilbage</button>
        <div class="job-title">#${currentOrder.orderNumber}</div>
        <div class="job-customer">${currentOrder.customerName || ''}</div>
      </div>
      <div class="steps-bar">
        <div class="step-item ${jobStep >= 1 ? 'active' : ''}" onclick="gotoStep(1)">
          <div class="step-num">1</div>
          <div class="step-label">${t().step1}</div>
        </div>
        <div class="step-line ${jobStep >= 2 ? 'active' : ''}"></div>
        <div class="step-item ${jobStep >= 2 ? 'active' : ''}" onclick="gotoStep(2)">
          <div class="step-num">2</div>
          <div class="step-label">${t().step2}</div>
        </div>
        <div class="step-line ${jobStep >= 3 ? 'active' : ''}"></div>
        <div class="step-item ${jobStep >= 3 ? 'active' : ''}" onclick="gotoStep(3)">
          <div class="step-num">3</div>
          <div class="step-label">${t().step3}</div>
        </div>
      </div>
      <div id="stepContent"></div>
    `;
    renderStep();
  }

  function gotoStep(n) {
    if (n > jobStep && n > 1) return; // can't skip ahead
    jobStep = n;
    renderStep();
  }

  function renderStep() {
    const content = document.getElementById('stepContent');
    if (jobStep === 1) renderStep1(content);
    else if (jobStep === 2) renderStep2(content);
    else if (jobStep === 3) renderStep3(content);
  }

  // STEP 1: Arrival + Before photos
  function renderStep1(el) {
    el.innerHTML = `
      <div class="step-body">
        <div class="info-card">
          <h3>📋 ${t().orderNum}: ${currentOrder.orderNumber}</h3>
          ${currentOrder.customerAddress ? `<p>📍 ${currentOrder.customerAddress}</p>` : ''}
          ${currentOrder.pdfUrl ? `<a href="${currentOrder.pdfUrl}" target="_blank" class="pdf-link">📄 ${t().viewPDF}</a>` : ''}
        </div>
        
        <div class="section-card">
          <h3>📸 ${t().photosBefore}</h3>
          <div class="photos-grid" id="beforePhotosGrid">
            ${renderPhotoThumbs(beforePhotos)}
          </div>
          <label class="photo-btn">
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this, 'before')">
            📷 ${t().addPhoto}
          </label>
        </div>

        <button class="primary-btn" onclick="markArrived()" ${currentOrder.status === 'inProgress' ? 'style="background:#3EBE6B"' : ''}>
          ${currentOrder.status === 'inProgress' ? '✓ Ankomst registreret — Fortsæt →' : `📍 ${t().arrivedBtn}`}
        </button>
      </div>
    `;
  }

  async function markArrived() {
    if (!currentOrder) return;
    try {
      await updateDoc(doc(db, 'orders', currentOrder.id), {
        status: 'inProgress',
        arrivedAt: new Date().toISOString(),
        jobStep: 2,
        beforePhotos
      });
      currentOrder.status = 'inProgress';
      currentOrder.jobStep = 2;
      jobStep = 2;
      showToast(t().arrivedConfirm, 'success');
      renderStep();
    } catch(e) {
      showToast('Fejl ved registrering', 'error');
    }
  }

  // STEP 2: Work in progress
  function renderStep2(el) {
    el.innerHTML = `
      <div class="step-body">
        <div class="info-card">
          <h3>🔧 Arbejde i gang</h3>
          <p style="opacity:.6; font-size:.85rem">Tag efter-billeder når du er færdig</p>
        </div>

        <div class="section-card">
          <h3>📸 ${t().photosAfter}</h3>
          <div class="photos-grid" id="afterPhotosGrid">
            ${renderPhotoThumbs(afterPhotos)}
          </div>
          <label class="photo-btn">
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this, 'after')">
            📷 ${t().addPhoto}
          </label>
        </div>

        <button class="primary-btn" onclick="gotoReportStep()">
          📋 ${t().fillReport} →
        </button>
      </div>
    `;
  }

  async function gotoReportStep() {
    try {
      await updateDoc(doc(db, 'orders', currentOrder.id), { afterPhotos, jobStep: 3 });
      currentOrder.jobStep = 3;
      jobStep = 3;
      renderStep();
    } catch(e) {
      jobStep = 3;
      renderStep();
    }
  }

  // STEP 3: Service Report
  function renderStep3(el) {
    el.innerHTML = `
      <div class="step-body">
        <div class="section-card">
          <h3>📋 Servicerapport</h3>

          <div class="form-group">
            <label>${t().startTime}</label>
            <input type="time" id="startTime" class="form-input" value="${currentOrder.startTime || ''}">
          </div>
          <div class="form-group">
            <label>${t().endTime}</label>
            <input type="time" id="endTime" class="form-input" value="${currentOrder.endTime || ''}">
          </div>
          <div class="form-group">
            <label>${t().hours}</label>
            <input type="number" id="hoursSpent" class="form-input" min="0" step="0.5" placeholder="0.0" value="${currentOrder.hoursSpent || ''}">
          </div>
          <div class="form-group">
            <label>${t().assemblers}</label>
            <input type="number" id="numAssemblers" class="form-input" min="1" placeholder="1" value="${currentOrder.numAssemblers || ''}">
          </div>

          <div class="form-group">
            <label>${t().additionalServices}</label>
            <div class="radio-row">
              <label class="radio-opt"><input type="radio" name="addSvc" value="yes"> ${t().yes}</label>
              <label class="radio-opt"><input type="radio" name="addSvc" value="no" checked> ${t().no}</label>
            </div>
          </div>
          <div class="form-group">
            <label>${t().contactedIkea}</label>
            <div class="radio-row">
              <label class="radio-opt"><input type="radio" name="ikea" value="yes"> ${t().yes}</label>
              <label class="radio-opt"><input type="radio" name="ikea" value="no" checked> ${t().no}</label>
            </div>
          </div>
          <div class="form-group" id="ikeaRefGroup" style="display:none">
            <label>${t().ikeaRef}</label>
            <input type="text" id="ikeaRef" class="form-input" placeholder="Reference nr.">
          </div>
        </div>

        <!-- STATUS -->
        <div class="section-card">
          <h3>✅ Service status</h3>
          <div class="status-options">
            <label class="status-opt completed-opt">
              <input type="radio" name="svcStatus" value="completed">
              <span>✓ ${t().serviceCompleted}</span>
            </label>
            <label class="status-opt failed-opt">
              <input type="radio" name="svcStatus" value="failed">
              <span>✕ ${t().serviceFailed}</span>
            </label>
            <label class="status-opt incomplete-opt">
              <input type="radio" name="svcStatus" value="incomplete">
              <span>◐ ${t().serviceIncomplete}</span>
            </label>
          </div>
          <div id="failReasonSection" style="display:none; margin-top:.75rem">
            <label class="form-label">${t().failReason}</label>
            ${['customerNotHome','articlesMissing','noCapacity','inappropriateConditions','paymentProblems'].map(r => `
              <label class="check-opt"><input type="checkbox" name="failReason" value="${r}"> ${t()[r]}</label>
            `).join('')}
          </div>
          <div id="incompleteReasonSection" style="display:none; margin-top:.75rem">
            <label class="form-label">${t().incompleteReason}</label>
            ${['articlesMissing','incorrectArticles','damagedArticles','preNotCorrect','salesError','paymentProblems','installError','changedMind'].map(r => `
              <label class="check-opt"><input type="checkbox" name="incompleteReason" value="${r}"> ${t()[r]}</label>
            `).join('')}
          </div>
        </div>

        <!-- WALL MOUNT DISCLAIMER -->
        <div class="section-card disclaimer-toggle-card">
          <h3>⚠️ ${t().wallMount}</h3>
          <div class="radio-row">
            <label class="radio-opt"><input type="radio" name="wallRefuse" value="yes" onchange="showDisclaimer(true)"> ${t().yes}</label>
            <label class="radio-opt"><input type="radio" name="wallRefuse" value="no" checked onchange="showDisclaimer(false)"> ${t().no}</label>
          </div>
        </div>

        <div class="section-card disclaimer-card" id="disclaimerCard" style="display:none">
          <h3>📜 ${t().disclaimerTitle}</h3>
          <div class="disclaimer-text">${t().disclaimerText}</div>
          <p class="sig-instruction">${t().disclaimerSign}:</p>
          <div class="sig-container">
            <canvas id="disclaimerCanvas" class="sig-canvas"></canvas>
            <button class="clear-sig-btn" onclick="clearSig('disclaimer')">✕ ${t().clearSig}</button>
          </div>
        </div>

        <!-- COMMENTS -->
        <div class="section-card">
          <h3>💬 ${t().comments}</h3>
          <textarea id="reportComments" class="form-textarea" placeholder="${t().comments}..." rows="3">${currentOrder.comments || ''}</textarea>
        </div>

        <!-- SATISFACTION -->
        <div class="section-card">
          <div class="radio-row">
            <span style="font-size:.85rem; opacity:.8">${t().satisfactionYes}?</span>
            <label class="radio-opt"><input type="radio" name="satisfaction" value="yes"> ${t().yes}</label>
            <label class="radio-opt"><input type="radio" name="satisfaction" value="no"> ${t().no}</label>
          </div>
        </div>

        <!-- TECH SIGNATURE -->
        <div class="section-card">
          <h3>✍️ ${t().techSignature}</h3>
          <p class="sig-instruction">${t().signHere}:</p>
          <div class="sig-container">
            <canvas id="techCanvas" class="sig-canvas"></canvas>
            <button class="clear-sig-btn" onclick="clearSig('tech')">✕ ${t().clearSig}</button>
          </div>
        </div>

        <!-- CUSTOMER SIGNATURE -->
        <div class="section-card">
          <h3>✍️ ${t().customerSignature}</h3>
          <p class="sig-instruction">${t().signHere}:</p>
          <div class="sig-container">
            <canvas id="customerCanvas" class="sig-canvas"></canvas>
            <button class="clear-sig-btn" onclick="clearSig('customer')">✕ ${t().clearSig}</button>
          </div>
        </div>

        <button class="primary-btn submit-btn" id="submitBtn" onclick="submitReport()">
          📤 ${t().submitReport}
        </button>

      </div>
    `;

    // Setup radio listeners
    document.querySelectorAll('input[name="svcStatus"]').forEach(r => {
      r.addEventListener('change', () => {
        document.getElementById('failReasonSection').style.display = r.value === 'failed' ? 'block' : 'none';
        document.getElementById('incompleteReasonSection').style.display = r.value === 'incomplete' ? 'block' : 'none';
      });
    });
    document.querySelector('input[name="ikea"][value="yes"]').addEventListener('change', () => {
      document.getElementById('ikeaRefGroup').style.display = 'block';
    });
    document.querySelector('input[name="ikea"][value="no"]').addEventListener('change', () => {
      document.getElementById('ikeaRefGroup').style.display = 'none';
    });

    // Setup signature canvases
    setTimeout(() => {
      setupSigCanvas('techCanvas', 'tech');
      setupSigCanvas('customerCanvas', 'customer');
    }, 100);
  }

  function showDisclaimer(show) {
    const card = document.getElementById('disclaimerCard');
    card.style.display = show ? 'block' : 'none';
    if (show) {
      setTimeout(() => setupSigCanvas('disclaimerCanvas', 'disclaimer'), 100);
      card.scrollIntoView({ behavior: 'smooth' });
    } else {
      disclaimerSigData = null;
    }
  }

  // ── SIGNATURE CANVAS ─────────────────────────────────────────
  function setupSigCanvas(canvasId, target) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = 160;
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let drawing = false, lx = 0, ly = 0;

    const getPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    };

    const start = (e) => { e.preventDefault(); drawing = true; const p = getPos(e); lx = p.x; ly = p.y; };
    const move = (e) => {
      e.preventDefault();
      if (!drawing) return;
      const p = getPos(e);
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
      lx = p.x; ly = p.y;
      if (target === 'tech') techSigData = canvas.toDataURL();
      else if (target === 'customer') customerSigData = canvas.toDataURL();
      else if (target === 'disclaimer') disclaimerSigData = canvas.toDataURL();
    };
    const end = () => { drawing = false; };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);
  }

  function clearSig(target) {
    const ids = { tech: 'techCanvas', customer: 'customerCanvas', disclaimer: 'disclaimerCanvas' };
    const canvas = document.getElementById(ids[target]);
    if (!canvas) return;
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    if (target === 'tech') techSigData = null;
    else if (target === 'customer') customerSigData = null;
    else if (target === 'disclaimer') disclaimerSigData = null;
  }

  // ── PHOTOS ───────────────────────────────────────────────────
  async function handlePhoto(input, type) {
    const file = input.files[0];
    if (!file) return;
    showToast('Uploader billede...', 'info');
    try {
      const storageRef = ref(storage, `photos/${currentOrder.id}/${type}/${Date.now()}.jpg`);
      const snap = await uploadBytes(storageRef, file);
      const url = await getDownloadURL(snap.ref);
      if (type === 'before') {
        beforePhotos.push(url);
        const grid = document.getElementById('beforePhotosGrid');
        if (grid) grid.innerHTML = renderPhotoThumbs(beforePhotos);
      } else {
        afterPhotos.push(url);
        const grid = document.getElementById('afterPhotosGrid');
        if (grid) grid.innerHTML = renderPhotoThumbs(afterPhotos);
      }
      showToast(t().photoSaved, 'success');
    } catch(e) {
      showToast('Fejl ved upload af billede', 'error');
    }
    input.value = '';
  }

  function renderPhotoThumbs(photos) {
    if (!photos.length) return '<p style="opacity:.4; font-size:.8rem; padding:.5rem 0">Ingen billeder endnu</p>';
    return photos.map(url => `<img src="${url}" class="photo-thumb" onclick="openPhoto('${url}')">`).join('');
  }

  function openPhoto(url) {
    const ov = document.getElementById('photoOverlay');
    document.getElementById('fullPhoto').src = url;
    ov.style.display = 'flex';
  }

  // ── SUBMIT REPORT ────────────────────────────────────────────
  async function submitReport() {
    const status = document.querySelector('input[name="svcStatus"]:checked')?.value;
    if (!status) { showToast('Vælg service status', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = t().saving;

    try {
      // Collect form data
      const failReasons = [...document.querySelectorAll('input[name="failReason"]:checked')].map(c => c.value);
      const incompleteReasons = [...document.querySelectorAll('input[name="incompleteReason"]:checked')].map(c => c.value);
      const addSvc = document.querySelector('input[name="addSvc"]:checked')?.value === 'yes';
      const contactedIkea = document.querySelector('input[name="ikea"]:checked')?.value === 'yes';
      const satisfaction = document.querySelector('input[name="satisfaction"]:checked')?.value === 'yes';
      const wallRefuse = document.querySelector('input[name="wallRefuse"]:checked')?.value === 'yes';

      // Upload signatures if they exist
      let techSigUrl = null, customerSigUrl = null, disclaimerSigUrl = null;
      if (techSigData) techSigUrl = await uploadDataURL(techSigData, `sigs/${currentOrder.id}/tech.png`);
      if (customerSigData) customerSigUrl = await uploadDataURL(customerSigData, `sigs/${currentOrder.id}/customer.png`);
      if (disclaimerSigData) disclaimerSigUrl = await uploadDataURL(disclaimerSigData, `sigs/${currentOrder.id}/disclaimer.png`);

      const reportData = {
        orderId: currentOrder.id,
        orderNumber: currentOrder.orderNumber,
        customerName: currentOrder.customerName || '',
        customerAddress: currentOrder.customerAddress || '',
        teamId: currentTeam.id,
        teamName: currentTeam.name,
        serviceStatus: status,
        failedReasons: failReasons,
        incompleteReasons: incompleteReasons,
        startTime: document.getElementById('startTime')?.value || '',
        endTime: document.getElementById('endTime')?.value || '',
        hoursSpent: document.getElementById('hoursSpent')?.value || '',
        numAssemblers: document.getElementById('numAssemblers')?.value || '',
        additionalServices: addSvc,
        contactedIkea,
        ikeaRef: document.getElementById('ikeaRef')?.value || '',
        comments: document.getElementById('reportComments')?.value || '',
        satisfaction,
        wallMountRefused: wallRefuse,
        beforePhotos,
        afterPhotos,
        techSignature: techSigUrl,
        customerSignature: customerSigUrl,
        disclaimerSignature: disclaimerSigUrl,
        completedAt: new Date().toISOString(),
        pdfUrl: currentOrder.pdfUrl || null
      };

      // Save report to Firestore
      await addDoc(collection(db, 'reports'), reportData);

      // Update order status
      await updateDoc(doc(db, 'orders', currentOrder.id), {
        status,
        completedAt: new Date().toISOString(),
        afterPhotos,
        jobStep: 3
      });

      // Send email notification via EmailJS or log it
      await sendEmailNotification(reportData);

      showToast(t().reportSubmitted, 'success');
      setTimeout(() => renderOrderList(), 1500);

    } catch(e) {
      console.error(e);
      showToast('Fejl ved indsendelse', 'error');
      btn.disabled = false;
      btn.textContent = `📤 ${t().submitReport}`;
    }
  }

  async function uploadDataURL(dataUrl, path) {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const storageRef = ref(storage, path);
    const snap = await uploadBytes(storageRef, blob);
    return getDownloadURL(snap.ref);
  }

  async function sendEmailNotification(report) {
    // Firebase Functions would handle actual email sending.
    // For now, log to Firestore so admin can trigger email via Firebase Extension (Trigger Email)
    await addDoc(collection(db, 'mail'), {
      to: ADMIN_EMAIL,
      message: {
        subject: `Servicerapport færdig — Ordre #${report.orderNumber} (${report.teamName})`,
        html: `
          <h2>Servicerapport indsendt</h2>
          <table style="border-collapse:collapse; width:100%; font-family:sans-serif">
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Ordre</b></td><td style="padding:8px; border-bottom:1px solid #eee">#${report.orderNumber}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Kunde</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.customerName}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Adresse</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.customerAddress}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Team</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.teamName}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Status</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.serviceStatus}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Start</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.startTime}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Slut</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.endTime}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Timer</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.hoursSpent}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Montører</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.numAssemblers}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Kommentarer</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.comments}</td></tr>
            <tr><td style="padding:8px; border-bottom:1px solid #eee"><b>Vægmontering afvist</b></td><td style="padding:8px; border-bottom:1px solid #eee">${report.wallMountRefused ? 'Ja' : 'Nej'}</td></tr>
            <tr><td style="padding:8px"><b>Kundetilfredshed</b></td><td style="padding:8px">${report.satisfaction ? 'Ja' : 'Nej'}</td></tr>
          </table>
          <p style="margin-top:16px; color:#888; font-size:12px">Sendt fra Smart Logistics Service App</p>
        `
      }
    });
  }

  function showToast(msg, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = msg;
    document.getElementById('toastContainer').appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
  }

  function toggleLang() {
    currentLang = currentLang === 'da' ? 'en' : 'da';
    localStorage.setItem('sl_lang', currentLang);
    if (currentTeam) { renderHeader(); if (currentStep === 'list') renderOrderList(); else renderJobView(); }
  }

  // Expose globals
  window.login = login;
  window.logout = logout;
  window.openJob = openJob;
  window.gotoStep = gotoStep;
  window.markArrived = markArrived;
  window.gotoReportStep = gotoReportStep;
  window.handlePhoto = handlePhoto;

  window.showDisclaimer = showDisclaimer;
  window.submitReport = submitReport;

  window.openPhoto = openPhoto;

  document.addEventListener('DOMContentLoaded', () => {

    const saved = localStorage.getItem('sl_team');
    if (saved && db) {
      currentTeam = JSON.parse(saved);
      showApp();
      startOrderListener();
      startGPS();
    }
  });
</script>

    width: 100%; padding: 1rem; background: var(--accent);
    border: none; border-radius: var(--radius); color: white;
    font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: opacity .2s, transform .1s;
  }
  .primary-btn:hover { opacity: .9; }
  .primary-btn:active { transform: scale(.99); }
  .primary-btn:disabled { opacity: .5; cursor: default; }
  .submit-btn { background: var(--success); margin-top: .5rem; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 4rem 2rem;
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    color: var(--text2);
  }

  /* PHOTO OVERLAY */
  #photoOverlay {

  }

  /* TOAST */

  .toast { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1.25rem; font-size: .85rem; transform: translateY(20px); opacity: 0; transition: all .3s; text-align: center; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-success { border-color: var(--success)50; color: var(--success); }
  .toast-error { border-color: var(--danger)50; color: var(--danger); }
  .toast-info { border-color: var(--accent)50; color: var(--accent); }
</style>
