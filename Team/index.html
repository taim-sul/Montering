      addPhoto: "Add photo", photoSaved: "Photo saved",

      startTime: "Start time", endTime: "End time",

      contactedIkea: "Contacted IKEA?", ikeaRef: "IKEA reference no.",

  let app, db, storage;
  let currentLang = localStorage.getItem('sl_lang') || 'da';
  let currentTeam = null;
  let myOrders = [];
  let currentOrder = null;
  let currentStep = 'list'; // list | job
  let jobStep = 1; // 1=arrival+before, 2=work, 3=report
  let beforePhotos = [];
  let afterPhotos = [];
  let techSigData = null;
  let customerSigData = null;
  let disclaimerSigData = null;
  let sigCanvas = null, sigCtx = null, sigDrawing = false;
  let activeSigTarget = null;
  let gpsWatcher = null;
  let unsubOrders = null;

  const t = () => LANG[currentLang];
  const tomorrow = () => { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; };
  const today = () => new Date().toISOString().split('T')[0];


  // ── THEME ────────────────────────────────────────────────────
  let currentTheme = localStorage.getItem('sl_theme') || 'dark';
  function applyTheme() { document.body.classList.toggle('light', currentTheme === 'light'); }
  function toggleTheme() {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('sl_theme', currentTheme);
    applyTheme();
    if (currentTeam) renderHeader();
  }
  window.toggleTheme = toggleTheme;

  // ── SYNC ─────────────────────────────────────────────────────
  let syncState = 'syncing';
  function setSyncState(state) {
    syncState = state;
    const el = document.getElementById('syncPill');
    if (!el) return;
    const labels = { synced: 'Synk', syncing: '...', offline: 'Offline' };
    el.className = `sync-pill ${state}`;
    el.innerHTML = `<div class="sync-dot ${state==='syncing'?'pulse':''}"></div>${labels[state]}`;
  }
  window.addEventListener('online', () => setSyncState('synced'));
  window.addEventListener('offline', () => setSyncState('offline'));

  // ── INSTALL PROMPT ───────────────────────────────────────────
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    if (!localStorage.getItem('sl_install_dismissed')) showInstallBanner();
  });
  function showInstallBanner() {
    if (document.getElementById('installBanner')) return;
    const b = document.createElement('div');
    b.id = 'installBanner'; b.className = 'install-banner';
    b.innerHTML = `
      <span style="font-size:1.8rem">📱</span>
      <div class="install-text flex:1">
        <strong>Installer app</strong>
        <span>Tilføj til startskærm for hurtig adgang</span>
      </div>
      <button class="install-btn" onclick="doInstall()">Installer</button>
      <button class="install-x" onclick="dismissInstall()">✕</button>
    `;
    document.body.appendChild(b);
  }
  async function doInstall() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner')?.remove();
  }
  function dismissInstall() {
    localStorage.setItem('sl_install_dismissed','1');
    document.getElementById('installBanner')?.remove();
  }

  function checkIOSInstall() {
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone;
    const dismissed = localStorage.getItem('sl_ios_dismissed');
    if (isIOS && !isStandalone && !dismissed) {
      setTimeout(showIOSBanner, 2000);
    }
  }
  function showIOSBanner() {
    if (document.getElementById('iosBanner')) return;
    const b = document.createElement('div');
    b.id = 'iosBanner'; b.className = 'install-banner';
    b.style.bottom = '1.5rem';
    b.innerHTML = `
      <span style="font-size:1.8rem">📱</span>
      <div style="flex:1">
        <strong style="display:block;font-size:.9rem">Installer på iPhone</strong>
        <span style="font-size:.78rem;color:var(--text2)">Tryk <b>Del</b> ↑ → <b>Føj til hjemmeskærm</b></span>
      </div>
      <button class="install-x" onclick="document.getElementById('iosBanner').remove(); localStorage.setItem('sl_ios_dismissed','1')">✕</button>
    `;
    document.body.appendChild(b);
  }
  window.doInstall = doInstall;
  window.dismissInstall = dismissInstall;

  function initFirebase() {
    try {
      app = initializeApp(FIREBASE_CONFIG);
      db = getFirestore(app);
      storage = getStorage(app);
    } catch(e) {
      showToast('Firebase ikke konfigureret', 'error');
    }
  }

  // ── AUTH ────────────────────────────────────────────────────
  function login() {
    const teamSel = document.getElementById('teamSelect').value;
    const pw = document.getElementById('teamPw').value;
    const team = TEAMS.find(t => t.id === teamSel);
    if (!team) { showToast('Vælg et team', 'error'); return; }
    if (pw !== team.password) { showToast('Forkert adgangskode', 'error'); return; }
    currentTeam = team;
    localStorage.setItem('sl_team', JSON.stringify(team));
    showApp();
    startOrderListener();
    startGPS();
  }

  function logout() {
    if (unsubOrders) unsubOrders();
    if (gpsWatcher) navigator.geolocation.clearWatch(gpsWatcher);
    currentTeam = null;
    localStorage.removeItem('sl_team');
    currentOrder = null;
    currentStep = 'list';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }

  function tryAutoLogin() {
    const saved = localStorage.getItem('sl_team');
    if (saved) {
      currentTeam = JSON.parse(saved);
      showApp();
      startOrderListener();
      startGPS();
    }
  }

  // ── GPS ─────────────────────────────────────────────────────
  function startGPS() {
    if (!navigator.geolocation) return;
    gpsWatcher = navigator.geolocation.watchPosition(pos => {
      if (!currentTeam || !db) return;
      setDoc(doc(db, 'locations', currentTeam.id), {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        timestamp: new Date().toISOString(),
        teamName: currentTeam.name
      }).catch(() => {});
    }, null, { enableHighAccuracy: true, maximumAge: 30000 });
  }

  // ── ORDERS ──────────────────────────────────────────────────
  function startOrderListener() {
    if (!currentTeam) return;
    if (!db) { setTimeout(startOrderListener, 300); return; }
    const q = query(collection(db, 'orders'), where('teamId', '==', currentTeam.id));
    setSyncState('syncing');
    unsubOrders = onSnapshot(q, snap => {
      setSyncState('synced');
      myOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (a.serviceDate || '') > (b.serviceDate || '') ? 1 : -1);
      if (currentStep === 'list') renderOrderList();
    }, err => {
      setSyncState('offline');
      showToast('Firebase fejl: ' + err.code, 'error');
    });
  }

  // ── SHOW APP ────────────────────────────────────────────────
  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    renderHeader();
    renderOrderList();
  }

  function renderHeader() {
    document.getElementById('appHeader').innerHTML = `
      <div class="header-brand">
        <span style="font-size:1.2rem">⚡</span>
        <span class="header-title">Smart Logistics</span>
      </div>
      <div class="header-right">
        <div id="syncPill" class="sync-pill syncing"><div class="sync-dot pulse"></div>...</div>
        <div class="team-pill" style="background:${currentTeam.color}20; color:${currentTeam.color}; border:1px solid ${currentTeam.color}40">
          ● ${currentTeam.name}
        </div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" title="Tema">${currentTheme==='dark'?'☀️':'🌙'}</button>
        <button class="icon-btn" onclick="toggleLang()" title="Sprog">🌐</button>
        <button class="icon-btn" onclick="logout()" title="Log ud">↩</button>
      </div>
    `;
  }

  // ── ORDER LIST ──────────────────────────────────────────────
  function isRecentOrder(o) {
    // Show completed/failed orders from last 7 days
    const ref = o.completedAt || o.uploadedAt || '';
    if (!ref) return false;
    const d = new Date(ref);
    return (Date.now() - d.getTime()) < 7 * 24 * 60 * 60 * 1000;
  }

  function formatServiceDate(order) {
    const sd = order.serviceDate || '';
    if (!sd) return t().myOrders;
    // Handle both YYYY-MM-DD and DD-MM-YYYY
    let date;
    if (sd.match(/^\d{4}-\d{2}-\d{2}$/)) {
      date = new Date(sd);
    } else if (sd.match(/^\d{2}-\d{2}-\d{4}$/)) {
      const [d, m, y] = sd.split('-');
      date = new Date(`${y}-${m}-${d}`);
    } else {
      return sd;
    }
    return date.toLocaleDateString('da-DK', { weekday:'long', day:'numeric', month:'long' });
  }

  function renderOrderList() {
    currentStep = 'list';
    const main = document.getElementById('mainContent');

    // Group by serviceDate
    const groups = {};
    myOrders.forEach(o => {
      const key = o.serviceDate || 'ukendt';
      if (!groups[key]) groups[key] = [];
      groups[key].push(o);
    });

    const groupKeys = Object.keys(groups).sort();
    const groupHTML = groupKeys.map(key => {
      const label = formatServiceDate(groups[key][0]);
      return `
        <div class="day-section">
          <div class="day-label">📅 ${label}</div>
          ${groups[key].map(o => renderOrderCard(o)).join('')}
        </div>`;
    }).join('');

    main.innerHTML = `
      <div class="list-header">
        <h1>${t().myOrders}</h1>
        <p style="color:var(--text2);font-size:.8rem;margin-top:.25rem">
          ${myOrders.length} ${currentLang==='da'?'opgave(r) tildelt':'task(s) assigned'}
        </p>
      </div>
      ${groupHTML || '<div class="empty-state"><div style="font-size:3rem">📭</div><p>' + t().noOrders + '</p></div>'}
    `;
  }

  function renderOrderCard(order) {
    const statusColors = { pending:'#E8A83E', inProgress:'#3E8BE8', completed:'#3EBE6B', failed:'#E83E3E', uploaded:'#888' };
    const statusLabels = { pending:t().pending, inProgress:t().inProgress, completed:t().completed, failed:t().failed, uploaded:t().pending };
    const color = statusColors[order.status] || '#888';
    const canStart = order.status !== 'completed' && order.status !== 'failed';

    return `
      <div class="order-card-team" onclick="${canStart ? ('openJob(\'' + order.id + '\')') : ''}">
        <div class="order-card-top">
          <div>
            <div class="order-num-team">#${order.orderNumber}</div>
            <div class="order-customer-team">${order.customerName || order.fileName}</div>
          </div>
          <div class="status-dot" style="background:${color}20; color:${color}; border:1px solid ${color}40">${statusLabels[order.status] || order.status}</div>
        </div>
        ${(order.customerAddress1||order.postalCityState) ? '<div class="order-address-team">📍 ' + (order.customerAddress1||'')+' '+(order.postalCityState?'· '+order.postalCityState:'')+'</div>' : ''}
        <div class="order-actions-team">
          ${order.pdfUrl ? '<a href="' + order.pdfUrl + '" target="_blank" class="card-btn btn-pdf" onclick="event.stopPropagation()">📄 PDF</a>' : ''}
          ${canStart ? '<div class="card-btn btn-start">' + (order.status==='inProgress'?'▶ Fortsæt':t().startJob) + ' →</div>' : '<div class="card-btn btn-done">✓ ' + t().completed + '</div>'}
        </div>
      </div>
    `;
  }

  // ── JOB FLOW ─────────────────────────────────────────────────
  function openJob(orderId) {
    currentOrder = myOrders.find(o => o.id === orderId);
    if (!currentOrder) return;
    beforePhotos = currentOrder.beforePhotos || [];
    afterPhotos = currentOrder.afterPhotos || [];
    jobStep = currentOrder.jobStep || 1;
    currentStep = 'job';
    renderJobView();
  }

  function renderJobView() {
    const main = document.getElementById('mainContent');
    main.innerHTML = `
      <div class="job-header">
        <button class="back-btn" onclick="renderOrderList()">← Tilbage</button>
        <div class="job-title">#${currentOrder.orderNumber}</div>
        <div class="job-customer">${currentOrder.customerName || ''}</div>
        ${currentOrder.customerAddress1 ? '<div class="job-address">📍 '+currentOrder.customerAddress1+(currentOrder.postalCityState?', '+currentOrder.postalCityState:'')+'</div>' : ''}
      </div>
      <div class="steps-bar">
        <div class="step-item ${jobStep >= 1 ? 'active' : ''}" onclick="gotoStep(1)">
          <div class="step-num">1</div>
          <div class="step-label">${t().step1}</div>
        </div>
        <div class="step-line ${jobStep >= 2 ? 'active' : ''}"></div>
        <div class="step-item ${jobStep >= 2 ? 'active' : ''}" onclick="gotoStep(2)">
          <div class="step-num">2</div>
          <div class="step-label">${t().step2}</div>
        </div>
        <div class="step-line ${jobStep >= 3 ? 'active' : ''}"></div>
        <div class="step-item ${jobStep >= 3 ? 'active' : ''}" onclick="gotoStep(3)">
          <div class="step-num">3</div>
          <div class="step-label">${t().step3}</div>
        </div>
      </div>
      <div id="stepContent"></div>
    `;
    renderStep();
  }

  function gotoStep(n) {
    if (n > jobStep && n > 1) return; // can't skip ahead
    jobStep = n;
    renderStep();
  }

  function renderStep() {
    const content = document.getElementById('stepContent');
    if (jobStep === 1) renderStep1(content);
    else if (jobStep === 2) renderStep2(content);
    else if (jobStep === 3) renderStep3(content);
  }

  // STEP 1: Arrival + Before photos
  function renderStep1(el) {
    el.innerHTML = `
      <div class="step-body">
        <div class="info-card">
          <h3>📋 ${t().orderNum}: ${currentOrder.orderNumber}</h3>
          ${currentOrder.customerAddress ? '<p>📍 ' + currentOrder.customerAddress + '</p>' : ''}
          ${currentOrder.pdfUrl ? '<a href="'+currentOrder.pdfUrl+'" target="_blank" class="pdf-link">📄 '+t().viewPDF+'</a>' : ''}
        </div>
        
        <div class="section-card">
          <h3>📸 ${t().photosBefore}</h3>
          <div class="photos-grid" id="beforePhotosGrid">
            ${renderPhotoThumbs(beforePhotos)}
          </div>
          <label class="photo-btn">
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this, 'before')">
            📷 ${t().addPhoto}
          </label>
        </div>

        <button class="primary-btn" onclick="markArrived()" ${currentOrder.status === 'inProgress' ? 'style="background:#3EBE6B"' : ''}>
          ${currentOrder.status === 'inProgress' ? '✓ Ankomst registreret — Fortsæt →' : '📍 ' + t().arrivedBtn}
        </button>
      </div>
    `;
  }

  async function markArrived() {
    if (!currentOrder) return;
    try {
      await updateDoc(doc(db, 'orders', currentOrder.id), {
        status: 'inProgress',
        arrivedAt: new Date().toISOString(),
        jobStep: 2,
        beforePhotos
      });
      currentOrder.status = 'inProgress';
      currentOrder.jobStep = 2;
      jobStep = 2;
      showToast(t().arrivedConfirm, 'success');
      renderStep();
    } catch(e) {
      showToast('Fejl ved registrering', 'error');
    }
  }

  // STEP 2: Work in progress
  function renderStep2(el) {
    el.innerHTML = `
      <div class="step-body">
        <div class="info-card">
          <h3>🔧 Arbejde i gang</h3>
          <p style="opacity:.6; font-size:.85rem">Tag efter-billeder når du er færdig</p>
        </div>

        <div class="section-card">
          <h3>📸 ${t().photosAfter}</h3>
          <div class="photos-grid" id="afterPhotosGrid">
            ${renderPhotoThumbs(afterPhotos)}
          </div>
          <label class="photo-btn">
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this, 'after')">
            📷 ${t().addPhoto}
          </label>
        </div>

        <button class="primary-btn" onclick="gotoReportStep()">
          📋 ${t().fillReport} →
        </button>
      </div>
    `;
  }

  async function gotoReportStep() {
    try {
      await updateDoc(doc(db, 'orders', currentOrder.id), { afterPhotos, jobStep: 3 });
      currentOrder.jobStep = 3;
      jobStep = 3;
      renderStep();
    } catch(e) {
      jobStep = 3;
      renderStep();
    }
  }

  // STEP 3: Service Report
  function renderStep3(el) {
    el.innerHTML = `
      <div class="step-body">
        <div class="section-card">
          <h3>📋 Servicerapport</h3>

          <div class="form-group">
            <label>${t().startTime}</label>
            <input type="time" id="startTime" class="form-input" value="${currentOrder.startTime || ''}">
          </div>
          <div class="form-group">
            <label>${t().endTime}</label>

  // ── SIGNATURE CANVAS ─────────────────────────────────────────
  function setupSigCanvas(canvasId, target) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = 160;
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let drawing = false, lx = 0, ly = 0;

    const getPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    };

    const start = (e) => { e.preventDefault(); drawing = true; const p = getPos(e); lx = p.x; ly = p.y; };
    const move = (e) => {
      e.preventDefault();
      if (!drawing) return;
      const p = getPos(e);
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
      lx = p.x; ly = p.y;
      if (target === 'tech') techSigData = canvas.toDataURL();
      else if (target === 'customer') customerSigData = canvas.toDataURL();
      else if (target === 'disclaimer') disclaimerSigData = canvas.toDataURL();
    };
    const end = () => { drawing = false; };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);
  }

  function clearSig(target) {
    const ids = { tech: 'techCanvas', customer: 'customerCanvas', disclaimer: 'disclaimerCanvas' };
    const canvas = document.getElementById(ids[target]);
    if (!canvas) return;
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    if (target === 'tech') techSigData = null;
    else if (target === 'customer') customerSigData = null;
    else if (target === 'disclaimer') disclaimerSigData = null;
  }

  // ── PHOTOS ───────────────────────────────────────────────────
  async function handlePhoto(input, type) {
    const file = input.files[0];
    if (!file) return;
    showToast('Uploader billede...', 'info');
    try {
      const storageRef = ref(storage, `photos/${currentOrder.id}/${type}/${Date.now()}.jpg`);
      const snap = await uploadBytes(storageRef, file);
      const url = await getDownloadURL(snap.ref);
      if (type === 'before') {
        beforePhotos.push(url);
        const grid = document.getElementById('beforePhotosGrid');
        if (grid) grid.innerHTML = renderPhotoThumbs(beforePhotos);
      } else {
        afterPhotos.push(url);
        const grid = document.getElementById('afterPhotosGrid');
        if (grid) grid.innerHTML = renderPhotoThumbs(afterPhotos);
      }
      showToast(t().photoSaved, 'success');
    } catch(e) {
      showToast('Fejl ved upload af billede', 'error');
    }
    input.value = '';
  }

  function renderPhotoThumbs(photos) {
    if (!photos.length) return '<p style="opacity:.4; font-size:.8rem; padding:.5rem 0">Ingen billeder endnu</p>';
    return photos.map(url => `<img src="${url}" class="photo-thumb" onclick="openPhoto('${url}')">`).join('');
  }

    const ov = document.getElementById('photoOverlay');

  // ── SUBMIT REPORT ────────────────────────────────────────────
  async function submitReport() {
    if (!db || !storage) { showToast('Firebase ikke klar - prøv igen', 'error'); return; }
    const status = document.querySelector('input[name="svcStatus"]:checked')?.value;
    if (!status) { showToast('Vælg service status', 'error'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = t().saving;
    try {
      const failReasons = [...document.querySelectorAll('input[name="failReason"]:checked')].map(c => c.value);
      const incompleteReasons = [...document.querySelectorAll('input[name="incompleteReason"]:checked')].map(c => c.value);
      const addSvc = document.querySelector('input[name="addSvc"]:checked')?.value === 'yes';
      const contactedIkea = document.querySelector('input[name="ikea"]:checked')?.value === 'yes';
      const satisfaction = document.querySelector('input[name="satisfaction"]:checked')?.value === 'yes';
      const wallRefuse = document.querySelector('input[name="wallRefuse"]:checked')?.value === 'yes';
      const completedAt = new Date().toISOString();
      let techSigUrl = null, customerSigUrl = null, disclaimerSigUrl = null;
      try {
        if (techSigData && techSigData.length > 100) techSigUrl = await uploadDataURL(techSigData, 'sigs/' + currentOrder.id + '/tech.png');
        if (customerSigData && customerSigData.length > 100) customerSigUrl = await uploadDataURL(customerSigData, 'sigs/' + currentOrder.id + '/customer.png');
        if (disclaimerSigData && disclaimerSigData.length > 100) disclaimerSigUrl = await uploadDataURL(disclaimerSigData, 'sigs/' + currentOrder.id + '/disclaimer.png');
      } catch(sigErr) {
        console.warn('Signatur upload fejl:', sigErr);
      }
      const reportData = {
        orderId: currentOrder.id, orderNumber: currentOrder.orderNumber,
        customerName: currentOrder.customerName || '',
        customerAddress1: currentOrder.customerAddress1 || '',
        postalCityState: currentOrder.postalCityState || '',
        teamId: currentTeam.id, teamName: currentTeam.name,
        serviceStatus: status, failedReasons, incompleteReasons,
        startTime: document.getElementById('startTime')?.value || '',
        endTime: document.getElementById('endTime')?.value || '',
        hoursSpent: document.getElementById('hoursSpent')?.value || '',
        numAssemblers: document.getElementById('numAssemblers')?.value || '',
        additionalServices: addSvc, contactedIkea,
        ikeaRef: document.getElementById('ikeaRef')?.value || '',
        comments: document.getElementById('reportComments')?.value || '',
        satisfaction, wallMountRefused: wallRefuse,
        beforePhotos, afterPhotos,
        techSignature: techSigUrl, customerSignature: customerSigUrl, disclaimerSignature: disclaimerSigUrl,
        completedAt, pdfUrl: currentOrder.pdfUrl || null,
        articles: currentOrder.articles || [],
        serviceDates: currentOrder.serviceDates || [],
        serviceProvider: currentOrder.serviceProvider || '',
        originatingStore: currentOrder.originatingStore || '',
        techSignatureData: techSigData,
        customerSignatureData: customerSigData,
        disclaimerSignatureData: disclaimerSigData,
      };
      // Save to Firestore FIRST — don't let PDF failure block the report
      showToast('Gemmer rapport...', 'info');
      const docRef = await addDoc(collection(db, 'reports'), reportData);
      await updateDoc(doc(db, 'orders', currentOrder.id), {
        status, completedAt, afterPhotos, jobStep: 3
      });
      showToast(t().reportSubmitted, 'success');

      // Then try email
      try { await sendEmailNotification(reportData); } catch(e) { console.warn('Email fejl:', e); }

      // Then try PDF generation (non-blocking)
      showToast('Genererer PDF...', 'info');
      let reportPdfUrl = null, disclaimerPdfUrl = null;
      try {
        reportPdfUrl = await generateAndUploadReportPDF(reportData);
        if (wallRefuse && disclaimerSigData) {
          disclaimerPdfUrl = await generateAndUploadDisclaimerPDF(reportData);
        }
        // Update Firestore with PDF urls
        await updateDoc(doc(db, 'orders', currentOrder.id), { reportPdfUrl, disclaimerPdfUrl });
        await updateDoc(docRef, { reportPdfUrl, disclaimerPdfUrl });
      } catch(pdfErr) {
        console.warn('PDF fejl (rapport er stadig gemt):', pdfErr);
        showToast('Rapport gemt — PDF fejlede', 'error');
      }

      showDownloadOptions(reportPdfUrl, disclaimerPdfUrl, reportData.orderNumber);
      setTimeout(() => renderOrderList(), 4000);
    } catch(e) {
      console.error(e);
      showToast('Fejl ved indsendelse', 'error');
      btn.disabled = false;
      btn.textContent = `📤 ${t().submitReport}`;
    }
  }

  async function loadJsPDF() {
    if (window.jspdf) return;
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  function drawPdfCheckbox(pdf, x, y, checked, label) {
    pdf.setLineWidth(0.4);
    pdf.rect(x, y, 3.5, 3.5);
    if (checked) { pdf.line(x, y, x+3.5, y+3.5); pdf.line(x+3.5, y, x, y+3.5); }
    pdf.setFontSize(8.5); pdf.setFont('helvetica','normal');
    pdf.text(label, x+5, y+3);
  }

  async function generateAndUploadReportPDF(report) {
    try {
      await loadJsPDF();
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit:'mm', format:'a4' });
      const W=210, margin=20;
      const order = currentOrder;

      const pageHeader = (n) => {
        pdf.setFontSize(18); pdf.setFont('helvetica','bold');
        pdf.text('Service Report', W/2, 18, {align:'center'});
        pdf.setFontSize(11); pdf.setFont('helvetica','normal');
        pdf.text(`${n}/3`, W-margin, 18, {align:'right'});
        pdf.setLineWidth(0.3); pdf.line(margin,21,W-margin,21);
      };

      // PAGE 1
      pageHeader(1);
      let y=30; const lh=7;
      const addF = (lbl, val) => {
        pdf.setFontSize(9); pdf.setFont('helvetica','normal');
        pdf.text(lbl, margin, y);
        pdf.setLineWidth(0.2); pdf.line(margin+65, y+0.5, W-margin, y+0.5);
        if(val) pdf.text(String(val), margin+66, y);
        y+=lh;
      };
      addF('Print date', new Date().toLocaleDateString('da-DK'));
      addF('Customer name', order.customerName||'');
      addF('Customer address 1', order.customerAddress1||'');
      addF('Customer address 2', '');
      addF('Customer address 3', '');
      addF('Postal code/city/state', order.postalCityState||'');
      addF('Primary phone', '');
      addF('Secondary phone', '');
      addF('Mobile phone', order.mobile||'');
      addF('Email', order.email||'');
      addF('Service provider', order.serviceProvider||'Bring E-Commerce & Logistics A/S');
      addF('Service product', order.serviceProduct||'Assembly');
      addF('Originating store', order.originatingStore||'');
      addF('Order number', order.orderNumber||'');
      addF('Delivery order number', order.deliveryOrderNumber||'');
      addF('Order attachment exists', 'No');
      addF('Delivery instructions', '');
      y+=3; pdf.setFontSize(9); pdf.text('Booked service dates', margin, y); y+=lh;
      (order.serviceDates||[]).forEach(d=>{ pdf.setFontSize(8); pdf.text(d,margin,y); y+=6; });

      // PAGE 2
      pdf.addPage(); pageHeader(2); y=30;
      pdf.setFontSize(9); pdf.text('Filled in by service provider',margin,y); y+=lh;
      const addF2 = (lbl,val) => {
        pdf.setFontSize(9); pdf.setFont('helvetica','normal'); pdf.text(lbl,margin,y);
        pdf.setLineWidth(0.2); pdf.line(margin+87,y+0.5,W-margin,y+0.5);
        if(val) pdf.text(String(val),margin+88,y); y+=lh;
      };
      addF2('Service actual start date/time', report.startTime||'');
      addF2('Service actual end date/time', report.endTime||'');
      pdf.text('Additional services needed?',margin,y);
      drawPdfCheckbox(pdf,margin+90,y-3,report.additionalServices,'Yes');
      drawPdfCheckbox(pdf,margin+112,y-3,!report.additionalServices,'No'); y+=lh;
      pdf.text('Hours to complete service',margin,y);
      pdf.line(margin+87,y+0.5,margin+117,y+0.5);
      if(report.hoursSpent) pdf.text(String(report.hoursSpent),margin+88,y);
      pdf.text('hours',margin+120,y); y+=lh;
      addF2('Who performed the service?(team/name)', report.teamName||'');
      addF2('Number of assemblers', report.numAssemblers||'');
      pdf.text('SP have been in contact with IKEA?',margin,y);
      drawPdfCheckbox(pdf,margin+90,y-3,report.contactedIkea,'Yes');
      drawPdfCheckbox(pdf,margin+112,y-3,!report.contactedIkea,'No'); y+=lh;
      addF2('Customer service reference id', report.ikeaRef||'');
      y+=5;
      drawPdfCheckbox(pdf,margin,y-3,report.serviceStatus==='completed','Service completed'); y+=lh;
      drawPdfCheckbox(pdf,margin,y-3,report.serviceStatus==='failed','Service failed'); y+=lh;
      drawPdfCheckbox(pdf,margin,y-3,report.serviceStatus==='incomplete','Service incomplete'); y+=lh+3;
      pdf.setFontSize(9); pdf.text('Select failed reason code',margin,y); y+=6;
      [['Customer not home','customerNotHome'],['No/Not enough capacity','noCapacity'],['Payment problems','paymentProblems']]
        .forEach(([l,k],i) => drawPdfCheckbox(pdf,margin,y+i*7.5-3,(report.failedReasons||[]).includes(k),l));
      [['Articles missing','articlesMissing'],['Inappropriate service conditions','inappropriateConditions']]
        .forEach(([l,k],i) => drawPdfCheckbox(pdf,margin+90,y+i*7.5-3,(report.failedReasons||[]).includes(k),l));
      y+=26;
      pdf.text('Select incomplete reason code',margin,y); y+=6;
      [['Articles missing','articlesMissing'],['Damaged articles','damagedArticles'],['Sales error','salesError'],['Installation error','installError']]
        .forEach(([l,k],i) => drawPdfCheckbox(pdf,margin,y+i*7.5-3,(report.incompleteReasons||[]).includes(k),l));
      [['Incorrect articles','incorrectArticles'],['Pre measurements not correct','preNotCorrect'],['Payment problems','paymentProblems'],['Changed mind','changedMind']]
        .forEach(([l,k],i) => drawPdfCheckbox(pdf,margin+90,y+i*7.5-3,(report.incompleteReasons||[]).includes(k),l));
      y+=36;
      pdf.text('Comments',margin,y); y+=5;
      if(report.comments){ const ls=pdf.splitTextToSize(report.comments,W-margin*2); pdf.text(ls,margin,y); y+=ls.length*5; }
      for(let i=0;i<4;i++){ y+=6; pdf.line(margin,y,W-margin,y); }
      y+=lh;
      const satLines=pdf.splitTextToSize('The service was without any complaints and performed to the satisfaction of the customer',100);
      pdf.text(satLines,margin,y);
      drawPdfCheckbox(pdf,margin+115,y-3,report.satisfaction,'Yes');
      drawPdfCheckbox(pdf,margin+135,y-3,!report.satisfaction,'No');
      y=265;
      pdf.line(margin,y,margin+35,y); pdf.setFontSize(8); pdf.text('Date',margin,y+4);
      pdf.setFontSize(9); pdf.text(new Date().toLocaleDateString('da-DK'),margin+1,y-1);
      pdf.line(margin+42,y,margin+125,y); pdf.setFontSize(8); pdf.text('Service provider signature',margin+42,y+4);
      if(report.techSignatureData){ try{pdf.addImage(report.techSignatureData,'PNG',margin+42,y-17,70,15);}catch(e){} }
      pdf.line(margin+132,y,W-margin,y); pdf.text('Customer signature',margin+132,y+4);
      if(report.customerSignatureData){ try{pdf.addImage(report.customerSignatureData,'PNG',margin+132,y-17,35,15);}catch(e){} }

      // PAGE 3
      pdf.addPage(); pageHeader(3); y=30;
      pdf.setFontSize(9); pdf.setFont('helvetica','bold'); pdf.text('Service articles',margin,y); y+=8;
      const cols=[63,18,15,18,22,10,16];
      ['Description','Net price','VAT','Gross price','Item no','Qty','Error code'].forEach((h,i)=>{
        let cx=margin; for(let j=0;j<i;j++) cx+=cols[j];
        pdf.setFontSize(8); pdf.setFont('helvetica','bold');
        pdf.text(h, cx+1, y);
      });
      y+=10; pdf.setLineWidth(0.3); pdf.line(margin,y-2,W-margin,y-2);
      pdf.setFont('helvetica','normal');
      (order.articles||[]).forEach(art=>{
        if(y>272){pdf.addPage();y=25;}
        const dl=pdf.splitTextToSize(art.description||'',cols[0]-2);
        pdf.setFontSize(8); pdf.text(dl,margin+1,y);
        [art.netPrice,art.vat,art.grossPrice,art.itemNo,art.qty,art.errorCode||''].forEach((v,i)=>{
          let cx=margin; for(let j=0;j<=i;j++) cx+=cols[j];
          pdf.text(String(v||''),cx+1,y);
        });
        y+=Math.max(6,dl.length*4.5);
      });

      const blob=pdf.output('blob');
      const sRef=ref(storage,`reports/${currentOrder.id}/servicerapport_${order.orderNumber}.pdf`);
      const snap=await uploadBytes(sRef,blob);
      pdf.save(`servicerapport_${order.orderNumber}.pdf`);
      return getDownloadURL(snap.ref);
    } catch(e){ console.error('PDF error:',e); return null; }
  }

  async function generateAndUploadDisclaimerPDF(report) {
    try {
      await loadJsPDF();
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({unit:'mm',format:'a4'});
      const W=210,margin=20; let y=25;
      pdf.setFontSize(13); pdf.setFont('helvetica','bold');
      pdf.text('Møbelmontering – Ansvarsfraskrivelse',margin,y); y+=8;
      pdf.setFontSize(10);
      pdf.text('Ved fravalg af vægforankring af produkt med monteringsservice.',margin,y); y+=8;
      pdf.setFontSize(9.5); pdf.setFont('helvetica','normal');
      const paras=[
        'Hos IKEA har sikkerhed højest prioritet, både når der udvikles, samles og monteres produkter. For at møblerne skal være så sikre som muligt at færdes i og omkring, kræver enkelte produkter fastgørelse til væg for at undgå at de vælter og går i stykker eller skader mennesker, dyr og andet.',
        'Når du bestiller Monteringsservice i IKEA, vil vi gerne have at du skal føle dig tryg ved at produkterne er sikre at anvende, og derfor indebærer det altid at produkter der kræver fastgørelse til væg, også bliver det.',
        'Montøren har, før opstart af monteringen, informeret dig om, at der i din service indgår et eller flere produkter der kræver fastgørelse i væg.',
        'Du har ønsket, ikke at lade montørerne udføre denne del af servicen, og det kan derfor medføre at produktet/produkterne vælter og forårsager alvorlig skade på mennesker, dyr og/eller andet. Ydermere vil produkt og servicegaranti frafalde hvis skaden opstår grundet manglende fastgørelse til væg.',
        'IKEA og/eller montøren kan derfor ikke tage noget ansvar for de skader der kan indtræffe på grund af at produktet ikke er fastgjort i væggen.',
        'Du har, med fravalget af vægforankring selv ansvaret for eventuelle skader (både direkte og indirekte) som kan opstå som følge af dette fravalg.',
      ];
      paras.forEach(p=>{ y+=2; const ls=pdf.splitTextToSize(p,W-margin*2); pdf.text(ls,margin,y); y+=ls.length*5.2; });
      y+=5;
      pdf.text(`Monteringsservice er i dag udført ifølge IKEA ordrenr.: ${report.orderNumber||''}`,margin,y); y+=10;
      const cl=pdf.splitTextToSize('Med din underskrift bekræfter du som kunde hermed at du er indforstået med indholdet i denne ansvarsfraskrivelse.',W-margin*2);
      pdf.text(cl,margin,y); y+=cl.length*5.5+10;
      const city=(currentOrder.postalCityState||'').replace(/^\d+\s*/,'');
      const fld=(lbl,val)=>{ pdf.setFontSize(9.5); pdf.text(`${lbl}:`,margin,y); pdf.setLineWidth(0.4); pdf.line(margin,y+1,W-margin,y+1); if(val) pdf.text(val,margin+1,y); y+=12; };
      fld('By',city);

      if(report.disclaimerSignatureData){try{pdf.addImage(report.disclaimerSignatureData,'PNG',margin,y-15,80,15);}catch(e){}}

      if(report.techSignatureData){try{pdf.addImage(report.techSignatureData,'PNG',margin,y-15,80,15);}catch(e){}}
      const blob=pdf.output('blob');
      const sRef=ref(storage,`reports/${currentOrder.id}/ansvarsfraskrivelse_${report.orderNumber}.pdf`);
      const snap=await uploadBytes(sRef,blob);
      pdf.save(`ansvarsfraskrivelse_${report.orderNumber}.pdf`);

  async function uploadDataURL(dataUrl, path) {
    // Convert data URL to blob without fetch (more reliable cross-browser)
    const arr = dataUrl.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while(n--) u8arr[n] = bstr.charCodeAt(n);
    const blob = new Blob([u8arr], { type: mime });
    const storageRef = ref(storage, path);
    const snap = await uploadBytes(storageRef, blob);
    return getDownloadURL(snap.ref);
  }

    background: none; border: none; font-size: 1.1rem;
    cursor: pointer; padding: .25rem; color: var(--text2);
    transition: color .15s;
  }
  .theme-toggle-btn:hover { color: var(--text); }

  /* SYNC INDICATOR */
  .sync-pill {
    display: inline-flex; align-items: center; gap: .35rem;
    padding: .25rem .6rem; border-radius: 999px;
    font-size: .7rem; font-weight: 600; transition: all .3s;
  }
  .sync-pill.synced { background: var(--success)15; color: var(--success); }
  .sync-pill.syncing { background: var(--warning)15; color: var(--warning); }
  .sync-pill.offline { background: var(--danger)15; color: var(--danger); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .sync-dot.pulse { animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes slideUp { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
  @keyframes spin { to{transform:rotate(360deg)} }


  /* INSTALL BANNER */
  .install-banner {
    position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--accent)50;
    border-radius: 16px; padding: 1rem 1.25rem;
    display: flex; align-items: center; gap: .75rem;
    box-shadow: 0 8px 32px #00000030; z-index: 400;
    width: calc(100% - 2rem); max-width: 400px;
    animation: slideUp .3s ease;
  }
  .install-text strong { display: block; font-size: .9rem; }
  .install-text span { font-size: .78rem; color: var(--text2); }
  .install-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: .5rem .9rem; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: inherit; flex-shrink: 0; }
  .install-x { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1rem; padding: .2rem; flex-shrink: 0; }

</style>
</head>
